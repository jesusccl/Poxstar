<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Furious Cars 1 — Endless</title>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
<meta name="theme-color" content="#FF4A1C" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23FF4A1C' d='M12 2 L14.6 8.6 L21.5 9.2 L16.2 13.7 L17.9 20.5 L12 16.9 L6.1 20.5 L7.8 13.7 L2.5 9.2 L9.4 8.6 Z'/%3E%3C/svg%3E" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: radial-gradient(ellipse at center, #1a1a2e 0%, #050510 100%);
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  #wrap { position: relative; }
  canvas {
    display: block;
    background: #1a1a1a;
    border: 3px solid #333;
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(255, 56, 56, 0.3);
    touch-action: none;
    max-width: 100vw;
    max-height: 100vh;
    aspect-ratio: 2 / 3;
    height: auto;
    width: 400px;
  }
  @media (max-height: 700px) {
    canvas { width: auto; height: calc(100vh - 20px); }
  }
  #hud {
    position: absolute; top: 10px; left: 10px; right: 10px;
    display: flex; justify-content: space-between;
    color: #fff; font-size: 14px; font-weight: bold;
    text-shadow: 0 0 4px #000;
    pointer-events: none;
    letter-spacing: 1px;
  }
  .hud-item { background: rgba(0,0,0,0.55); padding: 6px 10px; border-radius: 4px; }
  .lives { color: #ff5555; letter-spacing: 2px; }
  #scorebox {
    position: absolute; bottom: 10px; right: 10px;
    background: rgba(0,0,0,0.55);
    padding: 8px 12px; border-radius: 4px;
    color: #fff; font-size: 12px;
    line-height: 1.5;
    pointer-events: none;
    text-align: right;
    min-width: 130px;
  }
  #scorebox .label { opacity: 0.55; font-size: 10px; letter-spacing: 1.5px; }
  #scorebox .score-value { color: #3aa6ff; font-size: 18px; font-weight: bold; }
  #scorebox .best-value { color: #ffaa00; font-size: 13px; font-weight: bold; }
  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    background: rgba(0,0,0,0.88);
    color: #fff; text-align: center;
    border-radius: 8px;
    padding: 20px;
  }
  #overlay h1 {
    font-size: 38px; margin: 0 0 10px;
    color: #ff3838;
    text-shadow: 0 0 15px #ff3838, 0 0 30px #ff3838;
    letter-spacing: 3px;
  }
  #overlay p { margin: 6px 0; font-size: 15px; }
  #overlay .controls { opacity: 0.6; font-size: 13px; margin-top: 6px; }
  #overlay .new-record {
    color: #ffd700; font-weight: bold; font-size: 16px;
    text-shadow: 0 0 10px #ffd700;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse { 50% { opacity: 0.6; } }
  #overlay button {
    margin-top: 18px; padding: 14px 36px;
    font-size: 18px; background: #ff3838; color: #fff;
    border: none; border-radius: 4px; cursor: pointer;
    font-weight: bold; letter-spacing: 2px;
    font-family: inherit;
    box-shadow: 0 0 20px rgba(255, 56, 56, 0.5);
    transition: all 0.15s;
  }
  #overlay button:hover {
    background: #ff5555; transform: scale(1.05);
    box-shadow: 0 0 30px rgba(255, 56, 56, 0.8);
  }
  .color-picker {
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .color-picker .label {
    font-size: 11px;
    letter-spacing: 2px;
    opacity: 0.55;
  }
  .color-swatches {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .swatch {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.55);
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    padding: 0;
    background-clip: padding-box;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.15);
  }
  .swatch:hover { transform: scale(1.15); }
  .swatch.active {
    border-color: #fff;
    box-shadow: 0 0 12px currentColor, 0 0 0 2px rgba(255,255,255,0.4) inset;
    transform: scale(1.15);
  }
  #muteBtn {
    position: absolute;
    bottom: 10px; left: 10px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    border: none;
    width: 36px; height: 36px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    z-index: 10;
    transition: background 0.15s, transform 0.15s;
  }
  #muteBtn:hover { background: rgba(0,0,0,0.8); transform: scale(1.1); }
  #muteBtn.muted { color: #ff5555; }
  #pauseBtn {
    position: absolute;
    bottom: 10px; left: 56px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    border: none;
    width: 36px; height: 36px;
    border-radius: 50%;
    font-size: 14px;
    cursor: pointer;
    z-index: 10;
    transition: background 0.15s, transform 0.15s;
    display: none;
  }
  #pauseBtn:hover { background: rgba(0,0,0,0.8); transform: scale(1.1); }
  #pauseBtn.visible { display: block; }
  #pauseOverlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    background: rgba(0,0,0,0.86);
    border-radius: 8px;
    z-index: 20;
    padding: 20px;
  }
  #pauseOverlay h2 {
    font-size: 44px;
    color: #ffaa00;
    text-shadow: 0 0 15px #ffaa00;
    margin: 0 0 14px;
    letter-spacing: 4px;
    font-weight: bold;
  }
  #pauseOverlay .pause-stats {
    color: #fff;
    opacity: 0.7;
    margin-bottom: 26px;
    font-size: 13px;
    letter-spacing: 1.5px;
  }
  .pause-action {
    margin: 5px;
    padding: 12px 30px;
    font-size: 14px;
    letter-spacing: 2px;
    font-weight: bold;
    background: rgba(255,255,255,0.08);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    min-width: 180px;
  }
  .pause-action:hover {
    background: #ff3838;
    border-color: #ff3838;
    transform: scale(1.04);
  }
  .pause-action.primary { background: #ff3838; border-color: #ff3838; }
  .pause-action.primary:hover { background: #ff5555; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="400" height="600"></canvas>
  <div id="hud">
    <div class="hud-item lives" id="lives">♥ ♥ ♥</div>
    <div class="hud-item"><span id="speed">0</span> km/h</div>
    <div class="hud-item">LEVEL <span id="level">1</span></div>
  </div>
  <div id="scorebox">
    <div class="label">DISTANCE</div>
    <div class="score-value"><span id="score">0</span> m</div>
    <div class="label" style="margin-top:6px">BEST</div>
    <div class="best-value"><span id="best">0</span> m</div>
  </div>
  <button id="muteBtn" title="Mute (M)" aria-label="Mute">🔊</button>
  <button id="pauseBtn" title="Pause (P / ESC)" aria-label="Pause">⏸</button>
  <div id="pauseOverlay" class="hidden">
    <h2>PAUSED</h2>
    <p id="pauseStats" class="pause-stats"></p>
    <button class="pause-action primary" id="resumeBtn" type="button">▶ RESUME</button>
    <button class="pause-action" id="quitBtn" type="button">🏠 EXIT TO MAIN PAGE</button>
  </div>
  <div id="overlay">
    <h1 id="title">FURIOUS CARS 1</h1>
    <p id="msg">Endless mode. Survive as long as you can.</p>
    <p id="extra" class="hidden"></p>
    <p class="controls">← → / A D to steer</p>
    <p class="controls">↑ ↓ / W S — higher = faster</p>
    <p class="controls">📱 Mobile: drag your finger (higher = faster)</p>
    <p class="controls">⏸ ESC / P — pause &amp; exit</p>
    <div class="color-picker">
      <span class="label">CAR COLOR</span>
      <div class="color-swatches" id="swatches"></div>
    </div>
    <button id="startBtn">START</button>
  </div>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ─── Audio Module ─────────────────────────────────────────────
const Sound = (() => {
  let audioCtx = null;
  let masterGain = null;
  let muted = false;
  let engineOsc = null;
  let engineSubOsc = null;
  let engineGain = null;
  let engineFilter = null;

  try {
    muted = localStorage.getItem('furiousCarsMuted') === '1';
  } catch (e) {}

  function ensureCtx() {
    if (audioCtx) return audioCtx;
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return null;
    audioCtx = new Ctx();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = muted ? 0 : 0.6;
    masterGain.connect(audioCtx.destination);
    return audioCtx;
  }

  function resume() {
    const c = ensureCtx();
    if (c && c.state === 'suspended') c.resume();
  }

  function setMuted(v) {
    muted = v;
    try { localStorage.setItem('furiousCarsMuted', v ? '1' : '0'); } catch (e) {}
    if (masterGain) {
      masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
      masterGain.gain.linearRampToValueAtTime(v ? 0 : 0.6, audioCtx.currentTime + 0.1);
    }
  }
  function toggleMute() { setMuted(!muted); return muted; }
  function isMuted() { return muted; }

  // Beep / tono simple
  function tone(freq, dur, type = 'square', vol = 0.3, attack = 0.01, decay = 0.05) {
    const c = ensureCtx();
    if (!c) return;
    const o = c.createOscillator();
    const g = c.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.value = 0;
    g.gain.linearRampToValueAtTime(vol, c.currentTime + attack);
    g.gain.linearRampToValueAtTime(vol, c.currentTime + attack + decay);
    g.gain.linearRampToValueAtTime(0, c.currentTime + dur);
    o.connect(g);
    g.connect(masterGain);
    o.start();
    o.stop(c.currentTime + dur + 0.05);
  }

  // Noise burst (para choques)
  function noise(dur, vol = 0.5, filterFreq = 800) {
    const c = ensureCtx();
    if (!c) return;
    const bufferSize = Math.floor(c.sampleRate * dur);
    const buffer = c.createBuffer(1, bufferSize, c.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const src = c.createBufferSource();
    src.buffer = buffer;
    const filter = c.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = filterFreq;
    const g = c.createGain();
    g.gain.value = vol;
    g.gain.linearRampToValueAtTime(0, c.currentTime + dur);
    src.connect(filter);
    filter.connect(g);
    g.connect(masterGain);
    src.start();
    src.stop(c.currentTime + dur + 0.05);
  }

  // ── Engine: continuous modulable oscillator ──
  function startEngine() {
    const c = ensureCtx();
    if (!c) return;
    if (engineOsc) return; // already playing

    engineGain = c.createGain();
    engineGain.gain.value = 0;
    engineGain.gain.linearRampToValueAtTime(0.08, c.currentTime + 0.3);

    engineFilter = c.createBiquadFilter();
    engineFilter.type = 'lowpass';
    engineFilter.frequency.value = 600;
    engineFilter.Q.value = 4;

    engineOsc = c.createOscillator();
    engineOsc.type = 'sawtooth';
    engineOsc.frequency.value = 80;

    engineSubOsc = c.createOscillator();
    engineSubOsc.type = 'square';
    engineSubOsc.frequency.value = 40;
    const subGain = c.createGain();
    subGain.gain.value = 0.3;

    engineOsc.connect(engineFilter);
    engineSubOsc.connect(subGain);
    subGain.connect(engineFilter);
    engineFilter.connect(engineGain);
    engineGain.connect(masterGain);

    engineOsc.start();
    engineSubOsc.start();
  }

  function setEngineSpeed(velNorm) {
    // velNorm: 0..1 (speed ratio)
    if (!engineOsc || !audioCtx) return;
    const baseFreq = 60 + velNorm * 110;   // 60..170 Hz
    const subFreq = baseFreq * 0.5;
    const filterFreq = 400 + velNorm * 1400;
    const t = audioCtx.currentTime;
    engineOsc.frequency.linearRampToValueAtTime(baseFreq, t + 0.08);
    engineSubOsc.frequency.linearRampToValueAtTime(subFreq, t + 0.08);
    engineFilter.frequency.linearRampToValueAtTime(filterFreq, t + 0.08);
  }

  function stopEngine() {
    if (!engineOsc || !audioCtx) return;
    const t = audioCtx.currentTime;
    engineGain.gain.cancelScheduledValues(t);
    engineGain.gain.setValueAtTime(engineGain.gain.value, t);
    engineGain.gain.linearRampToValueAtTime(0, t + 0.3);
    const oscRef = engineOsc, subRef = engineSubOsc;
    engineOsc = null; engineSubOsc = null;
    setTimeout(() => { try { oscRef.stop(); subRef.stop(); } catch (e) {} }, 400);
  }

  // ── SFX puntuales ──
  function beepLow()   { tone(440, 0.18, 'square', 0.25); }
  function beepHigh()  { tone(880, 0.45, 'square', 0.3); }

  function crash() {
    noise(0.25, 0.45, 1200);
    tone(80, 0.18, 'sawtooth', 0.4);
    setTimeout(() => tone(60, 0.12, 'square', 0.25), 30);
  }

  function levelUp() {
    tone(660, 0.12, 'square', 0.25);
    setTimeout(() => tone(880, 0.18, 'square', 0.28), 100);
  }

  function gameOver() {
    const notes = [440, 370, 311, 261];
    notes.forEach((f, i) => setTimeout(() => tone(f, 0.25, 'triangle', 0.3), i * 130));
  }

  function newRecord() {
    const notes = [523, 659, 784, 1047, 1319];
    notes.forEach((f, i) => setTimeout(() => tone(f, 0.18, 'square', 0.28), i * 90));
  }

  function uiClick() { tone(600, 0.05, 'square', 0.15); }

  return {
    resume, setMuted, toggleMute, isMuted,
    startEngine, stopEngine, setEngineSpeed,
    beepLow, beepHigh, crash, levelUp, gameOver, newRecord, uiClick
  };
})();

const LANES = [W * 0.235, W * 0.5, W * 0.765];
const PLAYER_BASE_Y = H - 90;
const TOP_LIMIT = H * 0.3;
const BOT_LIMIT = H - 50;
const MIN_VEL = 3.0;
const MAX_VEL = 8.5;

// Endless tuning
const STARTING_LIVES = 3;
const INVULN_FRAMES = 60;            // ~1s a 60fps de invulnerabilidad post-choque
const RIVAL_BASE_COUNT = 4;
const RIVAL_MAX_COUNT = 8;
const LEVEL_DISTANCE = 500;          // meters per level
const RIVAL_COLORS = ['#ff3838', '#ffaa00', '#33dd55', '#ff66cc', '#9b59b6', '#1abc9c', '#e67e22'];
const RIVAL_NAMES  = ['RED', 'YEL', 'GRN', 'PNK', 'PRP', 'TEA', 'ORG'];

const PLAYER_COLORS = [
  { color: '#3aa6ff', name: 'BLUE' },
  { color: '#ff3838', name: 'RED' },
  { color: '#33dd55', name: 'GREEN' },
  { color: '#ff8800', name: 'ORANGE' },
  { color: '#ff3aa6', name: 'MAGENTA' },
  { color: '#1abc9c', name: 'CYAN' },
  { color: '#ffd700', name: 'GOLD' },
  { color: '#f5f0e8', name: 'WHITE' },
  { color: '#0F0F0F', name: 'BLACK' }
];

const livesEl = document.getElementById('lives');
const speedEl = document.getElementById('speed');
const levelEl = document.getElementById('level');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const overlay = document.getElementById('overlay');
const titleEl = document.getElementById('title');
const msgEl = document.getElementById('msg');
const extraEl = document.getElementById('extra');
const startBtn = document.getElementById('startBtn');
const swatchesEl = document.getElementById('swatches');

let player, rivals, smoke, particles, gameState, countdownState, shake;
let level, bestScore, playerColor;
const keys = {};

// Load saved best
try {
  bestScore = parseInt(localStorage.getItem('furiousCarsBest') || '0', 10) || 0;
} catch (e) { bestScore = 0; }
bestEl.textContent = bestScore;

// Cargar color preferido
try {
  playerColor = localStorage.getItem('furiousCarsColor') || PLAYER_COLORS[0].color;
} catch (e) { playerColor = PLAYER_COLORS[0].color; }
if (!PLAYER_COLORS.some(c => c.color === playerColor)) playerColor = PLAYER_COLORS[0].color;

// Construir paleta
function buildSwatches() {
  swatchesEl.innerHTML = '';
  PLAYER_COLORS.forEach(({ color, name }) => {
    const btn = document.createElement('button');
    btn.className = 'swatch' + (color === playerColor ? ' active' : '');
    btn.style.background = color;
    btn.style.color = color;
    btn.title = name;
    btn.setAttribute('aria-label', 'Color ' + name);
    btn.addEventListener('click', () => {
      Sound.resume();
      Sound.uiClick();
      playerColor = color;
      try { localStorage.setItem('furiousCarsColor', color); } catch (e) {}
      // Actualizar visual de todos los swatches
      swatchesEl.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      btn.classList.add('active');
      // If a player exists, change color immediately
      if (player) player.color = color;
    });
    swatchesEl.appendChild(btn);
  });
}
buildSwatches();

const keyLeft  = () => keys['ArrowLeft']  || keys['a'] || keys['A'];
const keyRight = () => keys['ArrowRight'] || keys['d'] || keys['D'];
const keyUp    = () => keys['ArrowUp']    || keys['w'] || keys['W'];
const keyDown  = () => keys['ArrowDown']  || keys['s'] || keys['S'];

function makeRival(worldYAhead) {
  const laneIdx = Math.floor(Math.random() * 3);
  const colorIdx = Math.floor(Math.random() * RIVAL_COLORS.length);
  // Mix of slow ones (obstacles to dodge) and fast ones (that catch up from behind)
  const fast = Math.random() < 0.25;
  const baseMax = fast ? (MAX_VEL + 0.5) : (MIN_VEL + Math.random() * 3.5);
  return {
    x: LANES[laneIdx],
    worldY: worldYAhead,
    vel: baseMax * 0.6,
    maxVel: baseMax + level * 0.15,
    acc: 0.08 + Math.random() * 0.08,
    color: RIVAL_COLORS[colorIdx],
    name: RIVAL_NAMES[colorIdx] || '?',
    isPlayer: false,
    w: 38, h: 68
  };
}

function spawnInitialRivals() {
  rivals = [];
  const count = Math.min(RIVAL_BASE_COUNT + Math.floor(level / 2), RIVAL_MAX_COUNT);
  for (let i = 0; i < count; i++) {
    const aheadDist = 200 + i * 250 + Math.random() * 200;
    rivals.push(makeRival(aheadDist));
  }
}

function reset() {
  player = {
    x: W * 0.5,
    y: PLAYER_BASE_Y,
    worldY: 0,
    vel: MIN_VEL,
    tilt: 0,
    color: playerColor, name: 'YOU',
    isPlayer: true,
    lives: STARTING_LIVES,
    invuln: 0,
    w: 38, h: 68
  };

  level = 1;
  smoke = [];
  particles = [];
  gameState = 'idle';
  countdownState = null;
  shake = 0;

  spawnInitialRivals();
}

function startGame() {
  Sound.resume();
  Sound.uiClick();
  reset();
  overlay.classList.add('hidden');
  extraEl.classList.add('hidden');
  pauseOverlay.classList.add('hidden');
  pauseBtn.classList.add('visible');
  gameState = 'countdown';
  Sound.startEngine();
  countdownStep(3);
}

function countdownStep(val) {
  countdownState = val;
  if (typeof val === 'number' && val > 1) {
    Sound.beepLow();
    setTimeout(() => countdownStep(val - 1), 800);
  } else if (val === 1) {
    Sound.beepLow();
    setTimeout(() => countdownStep('GO'), 800);
  } else {
    Sound.beepHigh();
    gameState = 'racing';
    setTimeout(() => { countdownState = null; }, 600);
  }
}

function updatePlayer() {
  const p = player;

  if (gameState !== 'racing') return;

  const moveSpeed = 6;
  let moving = 0;
  if (keyLeft())  { p.x -= moveSpeed; moving = -1; }
  if (keyRight()) { p.x += moveSpeed; moving = 1; }
  if (keyUp())    p.y -= moveSpeed * 0.7;
  if (keyDown())  p.y += moveSpeed * 0.7;

  p.tilt = p.tilt * 0.85 + moving * 0.08;

  p.x = Math.max(W * 0.12, Math.min(W * 0.88, p.x));
  p.y = Math.max(TOP_LIMIT, Math.min(BOT_LIMIT, p.y));

  // Speed as function of Y position (higher = faster)
  const t = (p.y - TOP_LIMIT) / (BOT_LIMIT - TOP_LIMIT);
  p.vel = MAX_VEL - t * (MAX_VEL - MIN_VEL);

  // Modulate engine with actual speed
  Sound.setEngineSpeed((p.vel - MIN_VEL) / (MAX_VEL - MIN_VEL));

  p.worldY += p.vel;

  // Level up every LEVEL_DISTANCE meters
  const newLevel = 1 + Math.floor((p.worldY / 10) / LEVEL_DISTANCE);
  if (newLevel > level) {
    level = newLevel;
    Sound.levelUp();
    // Speed up all existing rivals
    for (const r of rivals) r.maxVel += 0.4;
    // Add a rival if there is still room
    if (rivals.length < Math.min(RIVAL_BASE_COUNT + Math.floor(level / 2), RIVAL_MAX_COUNT)) {
      rivals.push(makeRival(p.worldY + H + Math.random() * H));
    }
  }

  if (p.invuln > 0) p.invuln--;

  // Humo del escape
  if (Math.random() < 0.4) {
    smoke.push({
      x: p.x + (Math.random() - 0.5) * 10,
      y: p.y + p.h / 2,
      vy: 2 + Math.random() * 2,
      life: 30,
      size: 4 + Math.random() * 4
    });
  }
}

function updateRival(r) {
  if (gameState !== 'racing') return;

  r.vel = Math.min(r.vel + r.acc, r.maxVel);
  r.worldY += r.vel;

  const screenY = PLAYER_BASE_Y - (r.worldY - player.worldY);
  if (screenY > H + 200) {
    // Left behind → respawn ahead
    Object.assign(r, makeRival(player.worldY + H + 200 + Math.random() * H * 1.5));
  } else if (screenY < -800) {
    // Escaped too far → respawn a bit behind
    Object.assign(r, makeRival(player.worldY + H + Math.random() * H));
  }
}

function checkCollisions() {
  if (player.invuln > 0) return;

  for (const r of rivals) {
    const rScreenY = PLAYER_BASE_Y - (r.worldY - player.worldY);
    if (Math.abs(r.x - player.x) < 32 && Math.abs(rScreenY - player.y) < 50) {
      const pushDir = player.x < r.x ? -1 : 1;
      player.x += pushDir * 6;
      player.x = Math.max(W * 0.12, Math.min(W * 0.88, player.x));
      player.y = Math.min(BOT_LIMIT, player.y + 8);
      r.vel *= 0.7;
      shake = 14;
      player.lives--;
      player.invuln = INVULN_FRAMES;
      Sound.crash();

      // Sparks
      for (let i = 0; i < 12; i++) {
        particles.push({
          x: (player.x + r.x) / 2,
          y: (player.y + rScreenY) / 2,
          vx: (Math.random() - 0.5) * 6,
          vy: (Math.random() - 0.5) * 6,
          life: 24,
          size: 2 + Math.random() * 3,
          color: i % 2 ? '#ffaa00' : '#ff3838'
        });
      }

      if (player.lives <= 0) {
        gameState = 'gameover';
        endRun();
      }
      break; // un solo choque por frame
    }
  }
}

function update(dt) {
  if (gameState === 'idle' || gameState === 'gameover' || gameState === 'paused') return;

  updatePlayer();
  for (const r of rivals) updateRival(r);
  if (gameState === 'racing') checkCollisions();

  // Humo
  for (const s of smoke) {
    s.y += s.vy;
    s.life--;
    s.size += 0.2;
  }
  smoke = smoke.filter(s => s.life > 0);

  // Particles
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.2;
    p.life--;
  }
  particles = particles.filter(p => p.life > 0);

  if (shake > 0) shake--;

  // HUD
  livesEl.textContent = '♥ '.repeat(Math.max(0, player.lives)).trim() || '✗';
  speedEl.textContent = Math.round(player.vel * 30);
  levelEl.textContent = level;
  scoreEl.textContent = Math.floor(player.worldY / 10);
}

function drawRoad() {
  // Pasto
  ctx.fillStyle = '#0d2010';
  ctx.fillRect(0, 0, W, H);

  // Detalles del pasto que se mueven
  ctx.fillStyle = '#1a3520';
  for (let i = 0; i < 8; i++) {
    const y = ((player.worldY * 1.2) + i * 80) % (H + 80) - 80;
    ctx.fillRect(W * 0.02, y, 6, 30);
    ctx.fillRect(W * 0.95, y, 6, 30);
  }

  // Calzada
  ctx.fillStyle = '#2a2a2a';
  ctx.fillRect(W * 0.08, 0, W * 0.84, H);

  // White side lines
  ctx.fillStyle = '#fff';
  ctx.fillRect(W * 0.08, 0, 4, H);
  ctx.fillRect(W * 0.92 - 4, 0, 4, H);

  // Yellow shoulder lines
  ctx.fillStyle = '#ffcc00';
  ctx.fillRect(W * 0.08 - 2, 0, 1, H);
  ctx.fillRect(W * 0.92 + 1, 0, 1, H);

  // Dashed lane lines
  ctx.fillStyle = '#fff';
  const dashH = 30, gap = 25;
  const total = dashH + gap;
  for (let lane = 1; lane <= 2; lane++) {
    const x = W * 0.08 + (W * 0.84) * (lane / 3) - 2;
    let y = (player.worldY % total) - total;
    while (y < H) {
      ctx.fillRect(x, y, 4, dashH);
      y += total;
    }
  }
}

function drawCar(c) {
  const screenY = c.isPlayer ? c.y : (PLAYER_BASE_Y - (c.worldY - player.worldY));
  if (screenY < -100 || screenY > H + 100) return;

  // Parpadeo de invulnerabilidad
  if (c.isPlayer && c.invuln > 0 && Math.floor(c.invuln / 4) % 2 === 0) return;

  ctx.save();
  ctx.translate(c.x, screenY);
  if (c.isPlayer && c.tilt) ctx.rotate(c.tilt);

  // Sombra
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(-c.w/2 + 3, -c.h/2 + 4, c.w, c.h);

  // Body
  ctx.fillStyle = c.color;
  ctx.fillRect(-c.w/2, -c.h/2, c.w, c.h);

  // Brillo
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(-c.w/2 + 2, -c.h/2 + 2, 4, c.h - 4);

  // Parabrisas
  ctx.fillStyle = '#1a2a3a';
  ctx.fillRect(-c.w/2 + 5, -c.h/2 + 8, c.w - 10, 16);
  ctx.fillRect(-c.w/2 + 5, c.h/2 - 24, c.w - 10, 16);

  // Center line
  ctx.fillStyle = c.isPlayer ? '#fff' : 'rgba(0,0,0,0.3)';
  ctx.fillRect(-1, -c.h/2 + 26, 2, c.h - 52);

  // Faros
  ctx.fillStyle = '#ffff88';
  ctx.fillRect(-c.w/2 + 4, -c.h/2 - 1, 6, 4);
  ctx.fillRect(c.w/2 - 10, -c.h/2 - 1, 6, 4);

  // Headlight halo for the player
  if (c.isPlayer) {
    ctx.fillStyle = 'rgba(255,255,150,0.15)';
    ctx.beginPath();
    ctx.moveTo(-c.w/2 + 7, -c.h/2);
    ctx.lineTo(-c.w/2 - 8, -c.h/2 - 40);
    ctx.lineTo(c.w/2 + 8, -c.h/2 - 40);
    ctx.lineTo(c.w/2 - 7, -c.h/2);
    ctx.closePath();
    ctx.fill();
  }

  // Luces traseras
  ctx.fillStyle = '#ff3333';
  ctx.fillRect(-c.w/2 + 4, c.h/2 - 3, 6, 3);
  ctx.fillRect(c.w/2 - 10, c.h/2 - 3, 6, 3);

  // Ruedas
  ctx.fillStyle = '#000';
  ctx.fillRect(-c.w/2 - 3, -c.h/2 + 6, 4, 14);
  ctx.fillRect(c.w/2 - 1, -c.h/2 + 6, 4, 14);
  ctx.fillRect(-c.w/2 - 3, c.h/2 - 20, 4, 14);
  ctx.fillRect(c.w/2 - 1, c.h/2 - 20, 4, 14);

  // Initial letter on rival roofs
  if (!c.isPlayer) {
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(c.name[0], 0, 0);
  }

  ctx.restore();
}

function drawCountdown() {
  if (countdownState === null) return;
  ctx.save();
  ctx.font = 'bold 90px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.lineWidth = 6;
  ctx.strokeStyle = '#000';
  ctx.fillStyle = countdownState === 'GO' ? '#33ff66' : '#ffaa00';
  const txt = countdownState === 'GO' ? 'GO!' : String(countdownState);
  ctx.shadowColor = ctx.fillStyle;
  ctx.shadowBlur = 25;
  ctx.strokeText(txt, W / 2, H / 2);
  ctx.fillText(txt, W / 2, H / 2);
  ctx.restore();
}

function draw() {
  ctx.save();
  if (shake > 0) {
    ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
  }

  drawRoad();

  // Humo (debajo de los autos)
  for (const s of smoke) {
    ctx.fillStyle = `rgba(180,180,180,${s.life / 60})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  }

  // Autos: orden por screenY ascendente para depth
  const allCars = [player, ...rivals];
  allCars.sort((a, b) => {
    const ay = a.isPlayer ? a.y : (PLAYER_BASE_Y - (a.worldY - player.worldY));
    const by = b.isPlayer ? b.y : (PLAYER_BASE_Y - (b.worldY - player.worldY));
    return ay - by;
  });
  for (const c of allCars) drawCar(c);

  // Particles
  for (const p of particles) {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = Math.min(1, p.life / 18);
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  drawCountdown();
  ctx.restore();
}

let lastTime = 0;
function loop(now) {
  const dt = lastTime ? Math.min(now - lastTime, 50) : 16;
  lastTime = now;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

function showOverlay(title, msg, btn, extra) {
  titleEl.textContent = title;
  msgEl.textContent = msg;
  startBtn.textContent = btn;
  if (extra) {
    extraEl.textContent = extra;
    extraEl.classList.remove('hidden');
    extraEl.classList.add('new-record');
  } else {
    extraEl.classList.add('hidden');
    extraEl.classList.remove('new-record');
  }
  overlay.classList.remove('hidden');
}

function endRun() {
  Sound.stopEngine();
  pauseBtn.classList.remove('visible');
  setTimeout(() => {
    const distance = Math.floor(player.worldY / 10);
    const isRecord = distance > bestScore;
    if (isRecord) {
      bestScore = distance;
      try { localStorage.setItem('furiousCarsBest', String(bestScore)); } catch (e) {}
      bestEl.textContent = bestScore;
      Sound.newRecord();
    } else {
      Sound.gameOver();
    }

    const title = isRecord ? 'NEW RECORD!' : 'WRECKED 💥';
    const msg = `Distance: ${distance} m · Level ${level}`;
    const extra = isRecord ? `★ ${distance} m ★` : `Best: ${bestScore} m`;
    showOverlay(title, msg, 'RETRY', extra);
  }, 900);
}

startBtn.addEventListener('click', startGame);

// Mute button
const muteBtn = document.getElementById('muteBtn');
function refreshMuteUI() {
  if (Sound.isMuted()) {
    muteBtn.textContent = '🔇';
    muteBtn.classList.add('muted');
    muteBtn.setAttribute('aria-label', 'Unmute');
    muteBtn.title = 'Unmute (M)';
  } else {
    muteBtn.textContent = '🔊';
    muteBtn.classList.remove('muted');
    muteBtn.setAttribute('aria-label', 'Mute');
    muteBtn.title = 'Mute (M)';
  }
}
refreshMuteUI();
muteBtn.addEventListener('click', () => {
  Sound.resume();
  Sound.toggleMute();
  refreshMuteUI();
});

// Pause / Resume / Exit
const pauseBtn = document.getElementById('pauseBtn');
const pauseOverlay = document.getElementById('pauseOverlay');
const pauseStats = document.getElementById('pauseStats');
const resumeBtn = document.getElementById('resumeBtn');
const quitBtn = document.getElementById('quitBtn');

function pauseGame() {
  if (gameState !== 'racing' && gameState !== 'countdown') return;
  gameState = 'paused';
  Sound.stopEngine();
  const distance = player ? Math.floor(player.worldY / 10) : 0;
  pauseStats.textContent = `Distance: ${distance} m · Level ${level}`;
  pauseOverlay.classList.remove('hidden');
}

function resumeGame() {
  if (gameState !== 'paused') return;
  gameState = 'racing';
  pauseOverlay.classList.add('hidden');
  // Clear any stuck input keys before resuming
  for (const k of ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown']) keys[k] = false;
  Sound.startEngine();
}

function exitToMainPage() {
  Sound.stopEngine();
  pauseOverlay.classList.add('hidden');
  pauseBtn.classList.remove('visible');

  const embedded = window.self !== window.top;

  if (!embedded) {
    // Standalone — navigate straight to the main page
    window.location.href = 'index.html';
    return;
  }

  // Embedded in PoxStar — scroll the parent page to its top (back to hero)
  let scrolled = false;
  try {
    window.parent.scrollTo({ top: 0, behavior: 'smooth' });
    scrolled = true;
  } catch (e) {
    // Cross-origin fallback: replace top window with the main page
    try { window.top.location.href = 'index.html'; return; } catch (e2) {}
  }

  // Reset overlay to start screen so the game is fresh if they come back
  reset();
  titleEl.textContent = 'FURIOUS CARS 1';
  msgEl.textContent = 'Endless mode. Survive as long as you can.';
  startBtn.textContent = 'START';
  extraEl.classList.add('hidden');
  extraEl.classList.remove('new-record');
  overlay.classList.remove('hidden');
}

pauseBtn.addEventListener('click', () => {
  Sound.resume();
  Sound.uiClick();
  pauseGame();
});
resumeBtn.addEventListener('click', () => {
  Sound.resume();
  Sound.uiClick();
  resumeGame();
});
quitBtn.addEventListener('click', () => {
  Sound.resume();
  Sound.uiClick();
  exitToMainPage();
});

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
  if (e.key === 'm' || e.key === 'M') {
    Sound.toggleMute();
    refreshMuteUI();
  }
  if (e.key === 'Escape' || e.key === 'p' || e.key === 'P') {
    e.preventDefault();
    if (gameState === 'racing' || gameState === 'countdown') {
      Sound.uiClick();
      pauseGame();
    } else if (gameState === 'paused') {
      Sound.uiClick();
      resumeGame();
    }
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// Touch controls — the car follows the finger position (X and Y)
let touchActive = false;

function applyTouchPos(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  // Convertir a coordenadas internas del canvas (puede estar escalado por CSS)
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const x = (clientX - rect.left) * scaleX;
  const y = (clientY - rect.top) * scaleY;

  // 12px dead zone around the car to avoid jitter
  const dz = 12;

  if (player) {
    keys['ArrowLeft']  = x < player.x - dz;
    keys['ArrowRight'] = x > player.x + dz;
    keys['ArrowUp']    = y < player.y - dz;
    keys['ArrowDown']  = y > player.y + dz;
  } else {
    // Before first reset(): simple left/right fallback
    keys['ArrowLeft']  = x < W / 2;
    keys['ArrowRight'] = x >= W / 2;
  }
}

function clearTouchKeys() {
  keys['ArrowLeft']  = false;
  keys['ArrowRight'] = false;
  keys['ArrowUp']    = false;
  keys['ArrowDown']  = false;
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchActive = true;
  applyTouchPos(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touchActive) return;
  applyTouchPos(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchActive = false;
  clearTouchKeys();
}, { passive: false });

canvas.addEventListener('touchcancel', e => {
  touchActive = false;
  clearTouchKeys();
}, { passive: false });

reset();
draw();
requestAnimationFrame(loop);
</script>
</body>
