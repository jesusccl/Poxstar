<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Furious Cars 1 — Endless</title>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
<meta name="theme-color" content="#FF4A1C" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23FF4A1C' d='M12 2 L14.6 8.6 L21.5 9.2 L16.2 13.7 L17.9 20.5 L12 16.9 L6.1 20.5 L7.8 13.7 L2.5 9.2 L9.4 8.6 Z'/%3E%3C/svg%3E" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: radial-gradient(ellipse at center, #1a1a2e 0%, #050510 100%);
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  #wrap { position: relative; }
  canvas {
    display: block;
    background: #1a1a1a;
    border: 3px solid #333;
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(255, 56, 56, 0.3);
    touch-action: none;
    max-width: 100vw;
    max-height: 100vh;
    aspect-ratio: 2 / 3;
    height: auto;
    width: 400px;
  }
  @media (max-height: 700px) {
    canvas { width: auto; height: calc(100vh - 20px); }
  }
  #hud {
    position: absolute; top: 10px; left: 10px; right: 10px;
    display: flex; justify-content: space-between;
    color: #fff; font-size: 14px; font-weight: bold;
    text-shadow: 0 0 4px #000;
    pointer-events: none;
    letter-spacing: 1px;
  }
  .hud-item { background: rgba(0,0,0,0.55); padding: 6px 10px; border-radius: 4px; }
  .lives { color: #ff5555; letter-spacing: 2px; }
  #scorebox {
    position: absolute; bottom: 10px; right: 10px;
    background: rgba(0,0,0,0.55);
    padding: 8px 12px; border-radius: 4px;
    color: #fff; font-size: 12px;
    line-height: 1.5;
    pointer-events: none;
    text-align: right;
    min-width: 130px;
  }
  #scorebox .label { opacity: 0.55; font-size: 10px; letter-spacing: 1.5px; }
  #scorebox .score-value { color: #3aa6ff; font-size: 18px; font-weight: bold; }
  #scorebox .best-value { color: #ffaa00; font-size: 13px; font-weight: bold; }
  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    background: rgba(0,0,0,0.88);
    color: #fff; text-align: center;
    border-radius: 8px;
    padding: 20px;
  }
  #overlay h1 {
    font-size: 38px; margin: 0 0 10px;
    color: #ff3838;
    text-shadow: 0 0 15px #ff3838, 0 0 30px #ff3838;
    letter-spacing: 3px;
  }
  #overlay p { margin: 6px 0; font-size: 15px; }
  #overlay .controls { opacity: 0.6; font-size: 13px; margin-top: 6px; }
  #overlay .new-record {
    color: #ffd700; font-weight: bold; font-size: 16px;
    text-shadow: 0 0 10px #ffd700;
    animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse { 50% { opacity: 0.6; } }
  #overlay button {
    margin-top: 18px; padding: 14px 36px;
    font-size: 18px; background: #ff3838; color: #fff;
    border: none; border-radius: 4px; cursor: pointer;
    font-weight: bold; letter-spacing: 2px;
    font-family: inherit;
    box-shadow: 0 0 20px rgba(255, 56, 56, 0.5);
    transition: all 0.15s;
  }
  #overlay button:hover {
    background: #ff5555; transform: scale(1.05);
    box-shadow: 0 0 30px rgba(255, 56, 56, 0.8);
  }
  .color-picker {
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .color-picker .label {
    font-size: 11px;
    letter-spacing: 2px;
    opacity: 0.55;
  }
  .color-swatches {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .swatch {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.55);
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    padding: 0;
    background-clip: padding-box;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.15);
  }
  .swatch:hover { transform: scale(1.15); }
  .swatch.active {
    border-color: #fff;
    box-shadow: 0 0 12px currentColor, 0 0 0 2px rgba(255,255,255,0.4) inset;
    transform: scale(1.15);
  }
  .mode-picker {
    margin-top: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .mode-picker .label {
    font-size: 11px;
    letter-spacing: 2px;
    opacity: 0.55;
  }
  .mode-options {
    display: flex;
    gap: 8px;
  }
  .mode-btn {
    background: rgba(255,255,255,0.08);
    color: #fff;
    border: 2px solid rgba(255,255,255,0.25);
    padding: 8px 14px;
    border-radius: 999px;
    font-family: inherit;
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .mode-btn:hover { background: rgba(255,255,255,0.18); transform: translateY(-1px); }
  .mode-btn.active {
    background: #ff3838;
    border-color: #ff3838;
    box-shadow: 0 0 14px rgba(255,56,56,0.5);
  }
  #muteBtn {
    position: absolute;
    bottom: 10px; left: 10px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    border: none;
    width: 36px; height: 36px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    z-index: 10;
    transition: background 0.15s, transform 0.15s;
  }
  #muteBtn:hover { background: rgba(0,0,0,0.8); transform: scale(1.1); }
  #muteBtn.muted { color: #ff5555; }
  #pauseBtn {
    position: absolute;
    bottom: 10px; left: 56px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    border: none;
    width: 36px; height: 36px;
    border-radius: 50%;
    font-size: 14px;
    cursor: pointer;
    z-index: 10;
    transition: background 0.15s, transform 0.15s;
    display: none;
  }
  #pauseBtn:hover { background: rgba(0,0,0,0.8); transform: scale(1.1); }
  #pauseBtn.visible { display: block; }
  #carBtn {
    position: absolute;
    bottom: 56px; right: 10px;
    background: rgba(0,0,0,0.65);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.4);
    padding: 7px 12px;
    border-radius: 999px;
    font-family: inherit;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 1.5px;
    cursor: pointer;
    z-index: 10;
    transition: background 0.15s, transform 0.15s;
    display: none;
  }
  #carBtn:hover { background: rgba(0,0,0,0.85); transform: scale(1.05); }
  #carBtn.visible { display: block; }
  #carBtn.disabled { opacity: 0.5; cursor: not-allowed; }
  #radioBtn {
    position: absolute;
    bottom: 56px; left: 10px;
    background: rgba(0,0,0,0.65);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.4);
    padding: 7px 10px;
    border-radius: 999px;
    font-family: inherit;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 1px;
    cursor: pointer;
    z-index: 10;
    transition: all 0.15s;
    min-width: 96px;
    text-align: center;
  }
  #radioBtn:hover { background: rgba(0,0,0,0.85); transform: translateY(-1px); }
  #radioBtn.tuned { border-color: #ffaa00; box-shadow: 0 0 12px rgba(255,170,0,0.4); }
  #pauseOverlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    background: rgba(0,0,0,0.86);
    border-radius: 8px;
    z-index: 20;
    padding: 20px;
  }
  #pauseOverlay h2 {
    font-size: 44px;
    color: #ffaa00;
    text-shadow: 0 0 15px #ffaa00;
    margin: 0 0 14px;
    letter-spacing: 4px;
    font-weight: bold;
  }
  #pauseOverlay .pause-stats {
    color: #fff;
    opacity: 0.7;
    margin-bottom: 26px;
    font-size: 13px;
    letter-spacing: 1.5px;
  }
  .pause-action {
    margin: 5px;
    padding: 12px 30px;
    font-size: 14px;
    letter-spacing: 2px;
    font-weight: bold;
    background: rgba(255,255,255,0.08);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.35);
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    min-width: 180px;
  }
  .pause-action:hover {
    background: #ff3838;
    border-color: #ff3838;
    transform: scale(1.04);
  }
  .pause-action.primary { background: #ff3838; border-color: #ff3838; }
  .pause-action.primary:hover { background: #ff5555; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="400" height="600"></canvas>
  <div id="hud">
    <div class="hud-item lives" id="lives">♥ ♥ ♥</div>
    <div class="hud-item"><span id="speed">0</span> km/h</div>
    <div class="hud-item">LEVEL <span id="level">1</span></div>
  </div>
  <div id="scorebox">
    <div class="label">DISTANCE</div>
    <div class="score-value"><span id="score">0</span> m</div>
    <div class="label" style="margin-top:6px">BEST</div>
    <div class="best-value"><span id="best">0</span> m</div>
    <div class="label" style="margin-top:6px">NEXT META</div>
    <div class="meta-value" style="color:#ffaa00;font-size:13px;font-weight:bold">🏁 <span id="metaDist">5000</span> m</div>
  </div>
  <button id="muteBtn" title="Mute (M)" aria-label="Mute">🔊</button>
  <button id="pauseBtn" title="Pause (P / ESC)" aria-label="Pause">⏸</button>
  <button id="carBtn" title="Exit / Enter car (E)" aria-label="Toggle car">🚪 EXIT CAR</button>
  <button id="radioBtn" title="Radio (R) — tap to change station" aria-label="Radio">📻 OFF</button>
  <div id="pauseOverlay" class="hidden">
    <h2>PAUSED</h2>
    <p id="pauseStats" class="pause-stats"></p>
    <button class="pause-action primary" id="resumeBtn" type="button">▶ RESUME</button>
    <button class="pause-action" id="quitBtn" type="button">🏠 EXIT TO MAIN PAGE</button>
  </div>
  <div id="overlay">
    <h1 id="title">FURIOUS CARS 1</h1>
    <p id="msg">Endless mode. Survive as long as you can.</p>
    <p id="extra" class="hidden"></p>
    <p class="controls">← → / A D to steer</p>
    <p class="controls">↑ ↓ / W S — higher = faster</p>
    <p class="controls">📱 Mobile: drag your finger (higher = faster)</p>
    <p class="controls">⏸ ESC / P — pause &amp; exit</p>
    <p class="controls">📻 R — cycle radio station</p>
    <div class="mode-picker">
      <span class="label">GAME MODE</span>
      <div class="mode-options">
        <button class="mode-btn" data-mode="race" id="modeRace" type="button">🏁 RACE</button>
        <button class="mode-btn" data-mode="free" id="modeFree" type="button">🌴 FREE ROAM</button>
      </div>
    </div>
    <div class="color-picker">
      <span class="label">CAR COLOR</span>
      <div class="color-swatches" id="swatches"></div>
    </div>
    <button id="startBtn">START</button>
  </div>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ─── Audio Module ─────────────────────────────────────────────
const Sound = (() => {
  let audioCtx = null;
  let masterGain = null;
  let muted = false;
  let engineOsc = null;
  let engineSubOsc = null;
  let engineGain = null;
  let engineFilter = null;

  try {
    muted = localStorage.getItem('furiousCarsMuted') === '1';
  } catch (e) {}

  function ensureCtx() {
    if (audioCtx) return audioCtx;
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return null;
    audioCtx = new Ctx();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = muted ? 0 : 0.6;
    masterGain.connect(audioCtx.destination);
    return audioCtx;
  }

  function resume() {
    const c = ensureCtx();
    if (c && c.state === 'suspended') c.resume();
  }

  function setMuted(v) {
    muted = v;
    try { localStorage.setItem('furiousCarsMuted', v ? '1' : '0'); } catch (e) {}
    if (masterGain) {
      masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
      masterGain.gain.linearRampToValueAtTime(v ? 0 : 0.6, audioCtx.currentTime + 0.1);
    }
  }
  function toggleMute() { setMuted(!muted); return muted; }
  function isMuted() { return muted; }

  // Beep / tono simple
  function tone(freq, dur, type = 'square', vol = 0.3, attack = 0.01, decay = 0.05) {
    const c = ensureCtx();
    if (!c) return;
    const o = c.createOscillator();
    const g = c.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.value = 0;
    g.gain.linearRampToValueAtTime(vol, c.currentTime + attack);
    g.gain.linearRampToValueAtTime(vol, c.currentTime + attack + decay);
    g.gain.linearRampToValueAtTime(0, c.currentTime + dur);
    o.connect(g);
    g.connect(masterGain);
    o.start();
    o.stop(c.currentTime + dur + 0.05);
  }

  // Noise burst (para choques)
  function noise(dur, vol = 0.5, filterFreq = 800) {
    const c = ensureCtx();
    if (!c) return;
    const bufferSize = Math.floor(c.sampleRate * dur);
    const buffer = c.createBuffer(1, bufferSize, c.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const src = c.createBufferSource();
    src.buffer = buffer;
    const filter = c.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = filterFreq;
    const g = c.createGain();
    g.gain.value = vol;
    g.gain.linearRampToValueAtTime(0, c.currentTime + dur);
    src.connect(filter);
    filter.connect(g);
    g.connect(masterGain);
    src.start();
    src.stop(c.currentTime + dur + 0.05);
  }

  // ── Engine: continuous modulable oscillator ──
  function startEngine() {
    const c = ensureCtx();
    if (!c) return;
    if (engineOsc) return; // already playing

    engineGain = c.createGain();
    engineGain.gain.value = 0;
    engineGain.gain.linearRampToValueAtTime(0.08, c.currentTime + 0.3);

    engineFilter = c.createBiquadFilter();
    engineFilter.type = 'lowpass';
    engineFilter.frequency.value = 600;
    engineFilter.Q.value = 4;

    engineOsc = c.createOscillator();
    engineOsc.type = 'sawtooth';
    engineOsc.frequency.value = 80;

    engineSubOsc = c.createOscillator();
    engineSubOsc.type = 'square';
    engineSubOsc.frequency.value = 40;
    const subGain = c.createGain();
    subGain.gain.value = 0.3;

    engineOsc.connect(engineFilter);
    engineSubOsc.connect(subGain);
    subGain.connect(engineFilter);
    engineFilter.connect(engineGain);
    engineGain.connect(masterGain);

    engineOsc.start();
    engineSubOsc.start();
  }

  function setEngineSpeed(velNorm) {
    // velNorm: 0..1 (speed ratio)
    if (!engineOsc || !audioCtx) return;
    const baseFreq = 60 + velNorm * 110;   // 60..170 Hz
    const subFreq = baseFreq * 0.5;
    const filterFreq = 400 + velNorm * 1400;
    const t = audioCtx.currentTime;
    engineOsc.frequency.linearRampToValueAtTime(baseFreq, t + 0.08);
    engineSubOsc.frequency.linearRampToValueAtTime(subFreq, t + 0.08);
    engineFilter.frequency.linearRampToValueAtTime(filterFreq, t + 0.08);
  }

  function stopEngine() {
    if (!engineOsc || !audioCtx) return;
    const t = audioCtx.currentTime;
    engineGain.gain.cancelScheduledValues(t);
    engineGain.gain.setValueAtTime(engineGain.gain.value, t);
    engineGain.gain.linearRampToValueAtTime(0, t + 0.3);
    const oscRef = engineOsc, subRef = engineSubOsc;
    engineOsc = null; engineSubOsc = null;
    setTimeout(() => { try { oscRef.stop(); subRef.stop(); } catch (e) {} }, 400);
  }

  // ── SFX puntuales ──
  function beepLow()   { tone(440, 0.18, 'square', 0.25); }
  function beepHigh()  { tone(880, 0.45, 'square', 0.3); }

  function crash() {
    noise(0.25, 0.45, 1200);
    tone(80, 0.18, 'sawtooth', 0.4);
    setTimeout(() => tone(60, 0.12, 'square', 0.25), 30);
  }

  function levelUp() {
    tone(660, 0.12, 'square', 0.25);
    setTimeout(() => tone(880, 0.18, 'square', 0.28), 100);
  }

  function gameOver() {
    const notes = [440, 370, 311, 261];
    notes.forEach((f, i) => setTimeout(() => tone(f, 0.25, 'triangle', 0.3), i * 130));
  }

  function newRecord() {
    const notes = [523, 659, 784, 1047, 1319];
    notes.forEach((f, i) => setTimeout(() => tone(f, 0.18, 'square', 0.28), i * 90));
  }

  function uiClick() { tone(600, 0.05, 'square', 0.15); }

  // ── Radio: 3 procedurally synthesized stations ──
  const RADIO_STATIONS = ['off', 'rock', 'synth', 'tropi'];
  const STATION_LABELS = {
    off:   '✗ OFF',
    rock:  '🎸 ROCK',
    synth: '🌃 SYNTH',
    tropi: '🌴 TROPI'
  };
  let musicGain = null;
  let musicFilter = null;
  let musicTimeoutId = null;
  let currentStation = 'off';
  let musicBarTime = 0;
  let musicBarIdx = 0;
  let noiseBuf = null;

  function ensureNoise() {
    if (noiseBuf || !audioCtx) return noiseBuf;
    const sr = audioCtx.sampleRate;
    const len = Math.floor(sr * 0.5);
    noiseBuf = audioCtx.createBuffer(1, len, sr);
    const d = noiseBuf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    return noiseBuf;
  }

  function mNote(time, freq, dur, type, vol, attack = 0.02) {
    if (!audioCtx || !musicGain) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.value = freq;
    g.gain.setValueAtTime(0, time);
    g.gain.linearRampToValueAtTime(vol, time + attack);
    g.gain.linearRampToValueAtTime(vol * 0.6, time + dur * 0.7);
    g.gain.linearRampToValueAtTime(0, time + dur);
    o.connect(g);
    g.connect(musicGain);
    o.start(time);
    o.stop(time + dur + 0.05);
  }

  function mKick(time, vol = 0.5) {
    if (!audioCtx || !musicGain) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(140, time);
    o.frequency.exponentialRampToValueAtTime(40, time + 0.12);
    g.gain.setValueAtTime(vol, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.18);
    o.connect(g);
    g.connect(musicGain);
    o.start(time);
    o.stop(time + 0.22);
  }

  function mSnare(time, vol = 0.4) {
    const buf = ensureNoise();
    if (!buf || !musicGain) return;
    const s = audioCtx.createBufferSource();
    s.buffer = buf;
    const f = audioCtx.createBiquadFilter();
    f.type = 'highpass';
    f.frequency.value = 1500;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(vol, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + 0.12);
    s.connect(f); f.connect(g); g.connect(musicGain);
    s.start(time); s.stop(time + 0.14);
  }

  function mHat(time, vol = 0.1, dur = 0.04) {
    const buf = ensureNoise();
    if (!buf || !musicGain) return;
    const s = audioCtx.createBufferSource();
    s.buffer = buf;
    const f = audioCtx.createBiquadFilter();
    f.type = 'highpass';
    f.frequency.value = 6500;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(vol, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + dur);
    s.connect(f); f.connect(g); g.connect(musicGain);
    s.start(time); s.stop(time + dur + 0.02);
  }

  function mPerc(time, vol = 0.12, dur = 0.04, freq = 1500) {
    const buf = ensureNoise();
    if (!buf || !musicGain) return;
    const s = audioCtx.createBufferSource();
    s.buffer = buf;
    s.playbackRate.value = 2 + Math.random();
    const f = audioCtx.createBiquadFilter();
    f.type = 'bandpass';
    f.frequency.value = freq;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(vol, time);
    g.gain.exponentialRampToValueAtTime(0.001, time + dur);
    s.connect(f); f.connect(g); g.connect(musicGain);
    s.start(time); s.stop(time + dur + 0.02);
  }

  // Station: ROCK (Em - C - G - D)
  const ROCK_ROOTS = [82.41, 65.41, 98.00, 73.42];
  function scheduleRockBar(t, bar, beat) {
    const root = ROCK_ROOTS[bar % 4];
    const fifth = root * 1.5;
    // Power chords on every beat (palm-muted feel)
    for (let i = 0; i < 4; i++) {
      const nt = t + i * beat;
      const d = beat * 0.7;
      mNote(nt, root, d, 'sawtooth', 0.13, 0.005);
      mNote(nt, fifth, d, 'sawtooth', 0.10, 0.005);
      mNote(nt, root * 2, d, 'square', 0.05, 0.005);
    }
    // Bass on each beat (octave below root)
    for (let i = 0; i < 4; i++) {
      mNote(t + i * beat, root / 2, beat * 0.85, 'square', 0.18, 0.005);
    }
    // Drums
    mKick(t + 0 * beat);
    mSnare(t + 1 * beat);
    mKick(t + 2 * beat);
    mSnare(t + 3 * beat);
    // Hi-hat on 8ths
    for (let i = 0; i < 8; i++) mHat(t + i * beat / 2, 0.09);
  }

  // Station: SYNTH (Am - F - C - G — synthwave)
  const SYNTH_CHORDS = [
    { root: 110.00, third: 130.81, fifth: 164.81 }, // Am
    { root:  87.31, third: 110.00, fifth: 130.81 }, // F
    { root: 130.81, third: 164.81, fifth: 196.00 }, // C
    { root:  98.00, third: 123.47, fifth: 146.83 }  // G
  ];
  function scheduleSynthBar(t, bar, beat) {
    const chord = SYNTH_CHORDS[bar % 4];
    // Pad: sustained sawtooth chord with slow attack
    mNote(t, chord.root,  beat * 4, 'sawtooth', 0.045, 0.4);
    mNote(t, chord.third, beat * 4, 'sawtooth', 0.045, 0.4);
    mNote(t, chord.fifth, beat * 4, 'sawtooth', 0.045, 0.4);
    // Bass: pulsing 8ths on octave below root
    for (let i = 0; i < 8; i++) {
      mNote(t + i * beat / 2, chord.root / 2, beat / 2 * 0.7, 'sine', 0.16, 0.005);
    }
    // Lead arpeggio: 1-3-5-3 on 16ths in higher octave
    const arp = [chord.root * 2, chord.third * 2, chord.fifth * 2, chord.third * 2];
    for (let i = 0; i < 16; i++) {
      mNote(t + i * beat / 4, arp[i % 4], beat / 4 * 0.85, 'square', 0.07, 0.005);
    }
    // Drums: 808 kick + snare on 2/4
    mKick(t + 0 * beat, 0.55);
    mSnare(t + 1 * beat, 0.35);
    mKick(t + 2 * beat, 0.55);
    mSnare(t + 3 * beat, 0.35);
    // Hi-hat on 16ths
    for (let i = 0; i < 16; i++) mHat(t + i * beat / 4, 0.05);
  }

  // Station: TROPI (F - C - G - C — cumbia/tropical)
  const TROPI_CHORDS = [
    { root:  87.31, third: 110.00, fifth: 130.81 }, // F
    { root: 130.81, third: 164.81, fifth: 196.00 }, // C
    { root:  98.00, third: 123.47, fifth: 146.83 }, // G
    { root: 130.81, third: 164.81, fifth: 196.00 }  // C
  ];
  function scheduleTropiBar(t, bar, beat) {
    const chord = TROPI_CHORDS[bar % 4];
    // Bouncy bass: root on 1 and 3, fifth on 2 and 4
    mNote(t + 0 * beat, chord.root / 2,  beat * 0.55, 'triangle', 0.19, 0.005);
    mNote(t + 1 * beat, chord.fifth / 2, beat * 0.55, 'triangle', 0.16, 0.005);
    mNote(t + 2 * beat, chord.root / 2,  beat * 0.55, 'triangle', 0.19, 0.005);
    mNote(t + 3 * beat, chord.fifth / 2, beat * 0.55, 'triangle', 0.16, 0.005);
    // Offbeat chord stabs (typical cumbia rhythm)
    [1, 3].forEach(b => {
      const nt = t + b * beat;
      const d = beat * 0.4;
      mNote(nt, chord.root  * 2, d, 'triangle', 0.09, 0.01);
      mNote(nt, chord.third * 2, d, 'triangle', 0.09, 0.01);
      mNote(nt, chord.fifth * 2, d, 'triangle', 0.09, 0.01);
    });
    // 4-on-the-floor kick
    for (let i = 0; i < 4; i++) mKick(t + i * beat, 0.4);
    // Güiro/shaker on 16ths
    for (let i = 0; i < 16; i++) {
      mPerc(t + i * beat / 4, i % 4 === 0 ? 0.14 : 0.08, 0.03, 1500 + Math.random() * 1000);
    }
    // Light melody on top (every other beat)
    const melody = [chord.fifth * 2, chord.third * 2, chord.root * 2, chord.third * 2];
    mNote(t + 0.5 * beat, melody[bar % 4], beat * 0.4, 'square', 0.07, 0.01);
    mNote(t + 2.5 * beat, melody[(bar + 1) % 4], beat * 0.4, 'square', 0.07, 0.01);
  }

  const STATION_BPM = { rock: 120, synth: 110, tropi: 95 };
  const STATION_SCHEDULERS = {
    rock: scheduleRockBar,
    synth: scheduleSynthBar,
    tropi: scheduleTropiBar
  };

  function scheduleMusicLoop() {
    if (currentStation === 'off' || !audioCtx) return;
    const bpm = STATION_BPM[currentStation];
    const beat = 60 / bpm;
    const barLen = beat * 4;
    const sched = STATION_SCHEDULERS[currentStation];
    if (!sched) return;

    sched(musicBarTime, musicBarIdx, beat);

    musicBarIdx++;
    musicBarTime += barLen;

    // Re-schedule slightly before this bar ends
    const now = audioCtx.currentTime;
    const msUntilNext = Math.max(50, (musicBarTime - now - barLen + 0.1) * 1000);
    musicTimeoutId = setTimeout(scheduleMusicLoop, msUntilNext);
  }

  function playStation(station) {
    const c = ensureCtx();
    if (!c) return;
    if (currentStation === station) return;

    if (musicTimeoutId) { clearTimeout(musicTimeoutId); musicTimeoutId = null; }

    if (station === 'off' || !RADIO_STATIONS.includes(station)) {
      currentStation = 'off';
      if (musicGain) {
        const t = c.currentTime;
        musicGain.gain.cancelScheduledValues(t);
        musicGain.gain.setValueAtTime(musicGain.gain.value, t);
        musicGain.gain.linearRampToValueAtTime(0, t + 0.4);
      }
      return;
    }

    currentStation = station;

    if (!musicGain) {
      musicGain = c.createGain();
      musicGain.gain.value = 0;
      musicFilter = c.createBiquadFilter();
      musicFilter.type = 'lowpass';
      musicFilter.frequency.value = 6000;
      musicGain.connect(musicFilter);
      musicFilter.connect(masterGain);
    }

    const t = c.currentTime;
    musicGain.gain.cancelScheduledValues(t);
    musicGain.gain.setValueAtTime(musicGain.gain.value, t);
    musicGain.gain.linearRampToValueAtTime(0.35, t + 0.3);

    musicBarIdx = 0;
    musicBarTime = t + 0.15;
    scheduleMusicLoop();
  }

  function cycleStation() {
    const i = RADIO_STATIONS.indexOf(currentStation);
    const next = RADIO_STATIONS[(i + 1) % RADIO_STATIONS.length];
    playStation(next);
    return next;
  }

  function getStation() { return currentStation; }
  function getStationLabel(s) { return STATION_LABELS[s] || s; }

  return {
    resume, setMuted, toggleMute, isMuted,
    startEngine, stopEngine, setEngineSpeed,
    beepLow, beepHigh, crash, levelUp, gameOver, newRecord, uiClick,
    playStation, cycleStation, getStation, getStationLabel
  };
})();

// ─── Free-roam world definition ───────────────────────────────
const FREE_WORLD = (() => {
  const buildings = [];
  // City grid: 4 cols × 3 rows of buildings
  const palette = ['#5a5a6a', '#6a5a5a', '#5a6a5a', '#7a6a5a', '#6a5a7a', '#5a7a6a', '#7a7a5a'];
  const cityStartX = -1100, cityStartY = -400;
  const blockSize = 230, bldgSize = 140;
  for (let i = 0; i < 4; i++) {
    for (let j = 0; j < 3; j++) {
      const x = cityStartX + i * blockSize + (blockSize - bldgSize) / 2;
      const y = cityStartY + j * blockSize + (blockSize - bldgSize) / 2;
      const seed = i * 11 + j * 23 + 7;
      buildings.push({
        x, y, w: bldgSize, h: bldgSize,
        color: palette[seed % palette.length],
        seed
      });
    }
  }
  return {
    buildings,
    roadHoriz: { x: -250, y: -45, w: 500, h: 90 },
    sand:  { x: 250, y: -800, w: 480, h: 1600 },
    water: { x: 730, y: -1200, w: 2000, h: 2400 },
    palms: [
      { x: 320, y: -550 }, { x: 380, y: 460 }, { x: 450, y: 300 },
      { x: 540, y: -320 }, { x: 580, y: 180 }, { x: 630, y: -80 },
      { x: 360, y: 60 }, { x: 480, y: 540 }, { x: 620, y: 420 }
    ]
  };
})();

function pointInRect(x, y, r) {
  return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
}

const keyLeft  = () => keys['ArrowLeft']  || keys['a'] || keys['A'];
const keyRight = () => keys['ArrowRight'] || keys['d'] || keys['D'];
const keyUp    = () => keys['ArrowUp']    || keys['w'] || keys['W'];
const keyDown  = () => keys['ArrowDown']  || keys['s'] || keys['S'];

function makeRival(worldYAhead) {
  const laneIdx = Math.floor(Math.random() * 3);
  const colorIdx = Math.floor(Math.random() * RIVAL_COLORS.length);
  // Mix of slow ones (obstacles to dodge) and fast ones (that catch up from behind)
  const fast = Math.random() < 0.25;
  const baseMax = fast ? (MAX_VEL + 0.5) : (MIN_VEL + Math.random() * 3.5);
  return {
    x: LANES[laneIdx],
    worldY: worldYAhead,
    vel: baseMax * 0.6,
    maxVel: baseMax + level * 0.15,
    acc: 0.08 + Math.random() * 0.08,
    color: RIVAL_COLORS[colorIdx],
    name: RIVAL_NAMES[colorIdx] || '?',
    isPlayer: false,
    w: 38, h: 68
  };
}

function spawnInitialRivals() {
  rivals = [];
  const count = Math.min(RIVAL_BASE_COUNT + Math.floor(level / 2), RIVAL_MAX_COUNT);
  for (let i = 0; i < count; i++) {
    const aheadDist = 200 + i * 250 + Math.random() * 200;
    rivals.push(makeRival(aheadDist));
  }
}

function triggerMeta(metaNumber) {
  metasCrossed = metaNumber;
  metaText = '🏁 META ' + metaNumber + ' ✓';
  metaTextTime = 130;
  Sound.newRecord();
  shake = 8;
  // Restore one life (up to starting amount)
  if (player.lives < STARTING_LIVES) player.lives++;
  // Confetti burst from top
  const colors = ['#ff3838', '#ffaa00', '#33dd55', '#3aa6ff', '#ff66cc', '#ffd700'];
  for (let i = 0; i < 60; i++) {
    particles.push({
      x: Math.random() * W,
      y: -10 - Math.random() * 30,
      vx: (Math.random() - 0.5) * 7,
      vy: Math.random() * 5 + 2,
      life: 80 + Math.random() * 30,
      size: 3 + Math.random() * 4,
      color: colors[Math.floor(Math.random() * colors.length)]
    });
  }
}

function reset() {
  if (gameMode === 'free') { resetFree(); return; }
  player = {
    x: W * 0.5,
    y: PLAYER_BASE_Y,
    worldY: 0,
    vel: MIN_VEL,
    tilt: 0,
    color: playerColor, name: 'YOU',
    isPlayer: true,
    lives: STARTING_LIVES,
    invuln: 0,
    w: 38, h: 68
  };

  level = 1;
  smoke = [];
  particles = [];
  gameState = 'idle';
  countdownState = null;
  shake = 0;
  metaText = null;
  metaTextTime = 0;
  metasCrossed = 0;

  spawnInitialRivals();
}

function resetFree() {
  player = {
    worldX: 0, worldY: 0,
    vx: 0, vy: 0,
    angle: 0,
    bobOffset: 0,
    stuck: false,
    onFoot: false,
    carWorldX: 0, carWorldY: 0, carAngle: 0,
    color: playerColor, name: 'YOU',
    isPlayer: true,
    w: 38, h: 60
  };
  rivals = [];
  smoke = [];
  particles = [];
  level = 1;
  shake = 0;
  countdownState = null;
  gameState = 'idle';
}

function startGame() {
  Sound.resume();
  Sound.uiClick();
  reset();
  overlay.classList.add('hidden');
  extraEl.classList.add('hidden');
  pauseOverlay.classList.add('hidden');
  pauseBtn.classList.add('visible');
  const hudEl = document.getElementById('hud');
  const sbEl = document.getElementById('scorebox');
  const carBtnEl = document.getElementById('carBtn');
  if (gameMode === 'free') {
    hudEl.style.display = 'none';
    sbEl.style.display = 'none';
    carBtnEl.classList.add('visible');
    carBtnEl.textContent = '🚪 EXIT CAR';
    carBtnEl.classList.remove('disabled');
    gameState = 'free';
    Sound.startEngine();
  } else {
    hudEl.style.display = '';
    sbEl.style.display = '';
    carBtnEl.classList.remove('visible');
    gameState = 'countdown';
    Sound.startEngine();
    countdownStep(3);
  }
  // Start the tuned radio station (if any)
  if (radioStation !== 'off') Sound.playStation(radioStation);
}

function countdownStep(val) {
  countdownState = val;
  if (typeof val === 'number' && val > 1) {
    Sound.beepLow();
    setTimeout(() => countdownStep(val - 1), 800);
  } else if (val === 1) {
    Sound.beepLow();
    setTimeout(() => countdownStep('GO'), 800);
  } else {
    Sound.beepHigh();
    gameState = 'racing';
    setTimeout(() => { countdownState = null; }, 600);
  }
}

function updatePlayer() {
  const p = player;

  if (gameState !== 'racing') return;

  const moveSpeed = 6;
  let moving = 0;
  if (keyLeft())  { p.x -= moveSpeed; moving = -1; }
  if (keyRight()) { p.x += moveSpeed; moving = 1; }
  if (keyUp())    p.y -= moveSpeed * 0.7;
  if (keyDown())  p.y += moveSpeed * 0.7;

  p.tilt = p.tilt * 0.85 + moving * 0.08;

  p.x = Math.max(W * 0.12, Math.min(W * 0.88, p.x));
  p.y = Math.max(TOP_LIMIT, Math.min(BOT_LIMIT, p.y));

  // Speed as function of Y position (higher = faster)
  const t = (p.y - TOP_LIMIT) / (BOT_LIMIT - TOP_LIMIT);
  p.vel = MAX_VEL - t * (MAX_VEL - MIN_VEL);

  // Modulate engine with actual speed
  Sound.setEngineSpeed((p.vel - MIN_VEL) / (MAX_VEL - MIN_VEL));

  p.worldY += p.vel;

  // Level up every LEVEL_DISTANCE meters
  const newLevel = 1 + Math.floor((p.worldY / 10) / LEVEL_DISTANCE);
  if (newLevel > level) {
    const wasLevel = level;
    level = newLevel;
    Sound.levelUp();
    // Speed up all existing rivals
    for (const r of rivals) r.maxVel += 0.4;
    // Add a rival if there is still room
    if (rivals.length < Math.min(RIVAL_BASE_COUNT + Math.floor(level / 2), RIVAL_MAX_COUNT)) {
      rivals.push(makeRival(p.worldY + H + Math.random() * H));
    }
    // META! Every META_LEVELS levels
    const oldMeta = Math.floor((wasLevel - 1) / META_LEVELS);
    const newMeta = Math.floor((level - 1) / META_LEVELS);
    if (newMeta > oldMeta) triggerMeta(newMeta);
  }

  if (p.invuln > 0) p.invuln--;

  // Humo del escape
  if (Math.random() < 0.4) {
    smoke.push({
      x: p.x + (Math.random() - 0.5) * 10,
      y: p.y + p.h / 2,
      vy: 2 + Math.random() * 2,
      life: 30,
      size: 4 + Math.random() * 4
    });
  }
}

function updateRival(r) {
  if (gameState !== 'racing') return;

  r.vel = Math.min(r.vel + r.acc, r.maxVel);
  r.worldY += r.vel;

  const screenY = PLAYER_BASE_Y - (r.worldY - player.worldY);
  if (screenY > H + 200) {
    // Left behind → respawn ahead
    Object.assign(r, makeRival(player.worldY + H + 200 + Math.random() * H * 1.5));
  } else if (screenY < -800) {
    // Escaped too far → respawn a bit behind
    Object.assign(r, makeRival(player.worldY + H + Math.random() * H));
  }
}

function checkCollisions() {
  if (player.invuln > 0) return;

  for (const r of rivals) {
    const rScreenY = PLAYER_BASE_Y - (r.worldY - player.worldY);
    if (Math.abs(r.x - player.x) < 32 && Math.abs(rScreenY - player.y) < 50) {
      const pushDir = player.x < r.x ? -1 : 1;
      player.x += pushDir * 6;
      player.x = Math.max(W * 0.12, Math.min(W * 0.88, player.x));
      player.y = Math.min(BOT_LIMIT, player.y + 8);
      r.vel *= 0.7;
      shake = 14;
      player.lives--;
      player.invuln = INVULN_FRAMES;
      Sound.crash();

      // Sparks
      for (let i = 0; i < 12; i++) {
        particles.push({
          x: (player.x + r.x) / 2,
          y: (player.y + rScreenY) / 2,
          vx: (Math.random() - 0.5) * 6,
          vy: (Math.random() - 0.5) * 6,
          life: 24,
          size: 2 + Math.random() * 3,
          color: i % 2 ? '#ffaa00' : '#ff3838'
        });
      }

      if (player.lives <= 0) {
        gameState = 'gameover';
        endRun();
      }
      break; // un solo choque por frame
    }
  }
}

function update(dt) {
  if (gameState === 'idle' || gameState === 'gameover' || gameState === 'paused' || gameState === 'stuck') return;

  if (gameState === 'free') { updateFree(dt); return; }

  updatePlayer();
  for (const r of rivals) updateRival(r);
  if (gameState === 'racing') checkCollisions();

  // Humo
  for (const s of smoke) {
    s.y += s.vy;
    s.life--;
    s.size += 0.2;
  }
  smoke = smoke.filter(s => s.life > 0);

  // Particles
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.2;
    p.life--;
  }
  particles = particles.filter(p => p.life > 0);

  if (shake > 0) shake--;

  // HUD
  livesEl.textContent = '♥ '.repeat(Math.max(0, player.lives)).trim() || '✗';
  speedEl.textContent = Math.round(player.vel * 30);
  levelEl.textContent = level;
  scoreEl.textContent = Math.floor(player.worldY / 10);
  // Distance to next meta
  const nextMetaWorldY = (metasCrossed + 1) * META_WORLD_STEP;
  const metaRemaining = Math.max(0, Math.floor((nextMetaWorldY - player.worldY) / 10));
  document.getElementById('metaDist').textContent = metaRemaining;
}

function updateFree(dt) {
  const p = player;
  const onFoot = p.onFoot;

  // Different physics for car vs walking
  const accel    = onFoot ? 0.28 : 0.4;
  const friction = onFoot ? 0.78 : 0.90;
  const maxVel   = onFoot ? 2.8  : 5.5;

  let ax = 0, ay = 0;
  if (keyLeft())  ax -= accel;
  if (keyRight()) ax += accel;
  if (keyUp())    ay -= accel;
  if (keyDown()) ay += accel;

  p.vx += ax;
  p.vy += ay;
  p.vx *= friction;
  p.vy *= friction;

  const speed = Math.hypot(p.vx, p.vy);
  if (speed > maxVel) {
    p.vx = p.vx / speed * maxVel;
    p.vy = p.vy / speed * maxVel;
  }

  // Smoothly rotate toward movement direction
  if (speed > (onFoot ? 0.2 : 0.4)) {
    const targetAngle = Math.atan2(p.vy, p.vx) + Math.PI / 2;
    let diff = targetAngle - p.angle;
    while (diff > Math.PI) diff -= 2 * Math.PI;
    while (diff < -Math.PI) diff += 2 * Math.PI;
    p.angle += diff * (onFoot ? 0.3 : 0.18);
  }

  // Try to move with axis-separated building collision (allows sliding)
  // Person has a smaller collision box than the car
  const halfW = onFoot ? 8  : 18;
  const halfH = onFoot ? 10 : 28;
  let newX = p.worldX + p.vx;
  let newY = p.worldY + p.vy;

  for (const b of FREE_WORLD.buildings) {
    if (newX + halfW > b.x && newX - halfW < b.x + b.w &&
        p.worldY + halfH > b.y && p.worldY - halfH < b.y + b.h) {
      newX = p.worldX; p.vx *= -0.25;
    }
    if (newX + halfW > b.x && newX - halfW < b.x + b.w &&
        newY + halfH > b.y && newY - halfH < b.y + b.h) {
      newY = p.worldY; p.vy *= -0.25;
    }
  }
  p.worldX = newX;
  p.worldY = newY;

  // Engine sound (only when in car)
  if (!onFoot) {
    Sound.setEngineSpeed(speed / maxVel);

    // Smoke from exhaust if moving
    if (speed > 1.2 && Math.random() < 0.35) {
      smoke.push({
        worldX: p.worldX - Math.sin(p.angle) * 28,
        worldY: p.worldY + Math.cos(p.angle) * 28,
        life: 35,
        size: 4 + Math.random() * 3,
        world: true
      });
    }
  }

  // Update smoke (in world coords)
  for (const s of smoke) {
    if (s.world) { s.life--; s.size += 0.15; }
  }
  smoke = smoke.filter(s => s.life > 0);

  // Water check — car drowns, person drowns
  if (pointInRect(p.worldX, p.worldY, FREE_WORLD.water)) {
    p.stuck = true;
    p.vx = 0; p.vy = 0;
    gameState = 'stuck';
    pauseBtn.classList.remove('visible');
    document.getElementById('carBtn').classList.remove('visible');
    Sound.stopEngine();
    Sound.crash();
    // Splash particles
    for (let i = 0; i < 16; i++) {
      particles.push({
        worldX: p.worldX, worldY: p.worldY,
        vx: (Math.random() - 0.5) * 8,
        vy: (Math.random() - 0.5) * 8 - 2,
        life: 40, size: 3 + Math.random() * 3,
        color: i % 2 ? '#aaccff' : '#ffffff',
        world: true
      });
    }
    setTimeout(() => {
      const wasOnFoot = onFoot;
      Sound.gameOver();
      const title = wasOnFoot ? '🌊 GLUB GLUB!' : '🌊 SPLASH!';
      const msg = wasOnFoot
        ? 'You walked into the sea. You can\'t swim that far!'
        : 'Engine flooded. The car won\'t move anymore.';
      const extra = `Reached (${Math.round(player.worldX)}, ${Math.round(player.worldY)})`;
      showOverlay(title, msg, '🔄 RETRY', extra);
    }, 1400);
  }

  // Update particles (water splash)
  for (const pt of particles) {
    if (pt.world) {
      pt.worldX += pt.vx; pt.worldY += pt.vy;
      pt.vy += 0.25;
      pt.life--;
    }
  }
  particles = particles.filter(pt => pt.life > 0);

  // Refresh car/foot UI button state (proximity may have changed)
  updateCarBtn();
}

function showStuckOverlay() {
  Sound.gameOver();
  const title = '🌊 SPLASH!';
  const msg = 'Engine flooded. The car won\'t move anymore.';
  const extra = `Reached (${Math.round(player.worldX)}, ${Math.round(player.worldY)})`;
  showOverlay(title, msg, '🔄 RETRY', extra);
}

function exitCar() {
  if (!player || gameState !== 'free' || player.onFoot || player.stuck) return false;
  // Remember where the car is parked
  player.carWorldX = player.worldX;
  player.carWorldY = player.worldY;
  player.carAngle = player.angle;
  // Place the person on the left side of the car (driver door)
  const sideAngle = player.angle - Math.PI / 2;
  player.worldX += Math.cos(sideAngle) * 32;
  player.worldY += Math.sin(sideAngle) * 32;
  player.vx = 0; player.vy = 0;
  player.onFoot = true;
  Sound.stopEngine();
  Sound.uiClick();
  updateCarBtn();
  return true;
}

function isNearCar() {
  if (!player || !player.onFoot) return false;
  const dx = player.worldX - player.carWorldX;
  const dy = player.worldY - player.carWorldY;
  return Math.hypot(dx, dy) < 60;
}

function enterCar() {
  if (!player || gameState !== 'free' || !player.onFoot) return false;
  if (!isNearCar()) return false;
  player.worldX = player.carWorldX;
  player.worldY = player.carWorldY;
  player.angle = player.carAngle;
  player.vx = 0; player.vy = 0;
  player.onFoot = false;
  Sound.startEngine();
  Sound.uiClick();
  updateCarBtn();
  return true;
}

function toggleCar() {
  if (!player || gameState !== 'free') return;
  if (player.onFoot) enterCar();
  else exitCar();
}

function updateCarBtn() {
  const btn = document.getElementById('carBtn');
  if (gameState !== 'free') {
    btn.classList.remove('visible');
    return;
  }
  btn.classList.add('visible');
  if (player.onFoot) {
    btn.textContent = '🚗 ENTER CAR';
    btn.classList.toggle('disabled', !isNearCar());
  } else {
    btn.textContent = '🚪 EXIT CAR';
    btn.classList.remove('disabled');
  }
}

function drawPersonLocal(shirtColor) {
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(2, 3, 10, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  // Body (shirt)
  ctx.fillStyle = shirtColor;
  ctx.fillRect(-7, -4, 14, 16);
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(-7, -4, 14, 3); // collar shadow
  // Arms (slightly darker than shirt)
  ctx.fillStyle = shirtColor;
  ctx.fillRect(-10, -2, 3, 8);
  ctx.fillRect(7, -2, 3, 8);
  // Head (skin)
  ctx.fillStyle = '#dba87a';
  ctx.beginPath();
  ctx.arc(0, -7, 5.5, 0, Math.PI * 2);
  ctx.fill();
  // Hair (back of head)
  ctx.fillStyle = '#2a1a0a';
  ctx.beginPath();
  ctx.arc(0, -9, 5.5, Math.PI, 2 * Math.PI);
  ctx.fill();
  // Feet (dark dots)
  ctx.fillStyle = '#1a1208';
  ctx.fillRect(-5, 11, 4, 4);

}

function drawRoad() {
  // Pasto
  ctx.fillStyle = '#0d2010';
  ctx.fillRect(0, 0, W, H);

  // Detalles del pasto que se mueven
  ctx.fillStyle = '#1a3520';
  for (let i = 0; i < 8; i++) {
    const y = ((player.worldY * 1.2) + i * 80) % (H + 80) - 80;
    ctx.fillRect(W * 0.02, y, 6, 30);
    ctx.fillRect(W * 0.95, y, 6, 30);
  }

  // Calzada
  ctx.fillStyle = '#2a2a2a';
  ctx.fillRect(W * 0.08, 0, W * 0.84, H);

  // White side lines
  ctx.fillStyle = '#fff';
  ctx.fillRect(W * 0.08, 0, 4, H);
  ctx.fillRect(W * 0.92 - 4, 0, 4, H);

  // Yellow shoulder lines
  ctx.fillStyle = '#ffcc00';
  ctx.fillRect(W * 0.08 - 2, 0, 1, H);
  ctx.fillRect(W * 0.92 + 1, 0, 1, H);

  // Dashed lane lines
  ctx.fillStyle = '#fff';
  const dashH = 30, gap = 25;
  const total = dashH + gap;
  for (let lane = 1; lane <= 2; lane++) {
    const x = W * 0.08 + (W * 0.84) * (lane / 3) - 2;
    let y = (player.worldY % total) - total;
    while (y < H) {
      ctx.fillRect(x, y, 4, dashH);
      y += total;
    }
  }

  // ── Meta finish line (race mode) ──
  // Next meta is at worldY = (metasCrossed + 1) * META_WORLD_STEP
  const nextMetaY = (metasCrossed + 1) * META_WORLD_STEP;
  const metaScreenY = PLAYER_BASE_Y - (nextMetaY - player.worldY);
  if (metaScreenY > -80 && metaScreenY < H + 40) {
    const roadLeft = W * 0.08 + 4;
    const roadW = W * 0.84 - 8;
    // Checkered pattern (2 rows)
    const checkSize = 16;
    const cols = Math.ceil(roadW / checkSize);
    for (let i = 0; i < cols; i++) {
      for (let j = 0; j < 2; j++) {
        ctx.fillStyle = (i + j) % 2 === 0 ? '#fff' : '#000';
        ctx.fillRect(roadLeft + i * checkSize, metaScreenY + j * checkSize, checkSize, checkSize);
      }
    }
    // Banner above with META label (only when line is visible enough)
    if (metaScreenY > 60) {
      const banY = metaScreenY - 46;
      // Banner background
      ctx.fillStyle = '#ffaa00';
      ctx.fillRect(W * 0.12, banY, W * 0.76, 30);
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 2;
      ctx.strokeRect(W * 0.12, banY, W * 0.76, 30);
      // Posts on each side
      ctx.fillStyle = '#000';
      ctx.fillRect(W * 0.12 - 3, banY, 3, 46);
      ctx.fillRect(W * 0.88, banY, 3, 46);
      // Text
      ctx.fillStyle = '#000';
      ctx.font = 'bold 17px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🏁 META ' + (metasCrossed + 1), W / 2, banY + 15);
    }
  }
}

function drawCar(c) {
  const screenY = c.isPlayer ? c.y : (PLAYER_BASE_Y - (c.worldY - player.worldY));
  if (screenY < -100 || screenY > H + 100) return;

  // Parpadeo de invulnerabilidad
  if (c.isPlayer && c.invuln > 0 && Math.floor(c.invuln / 4) % 2 === 0) return;

  ctx.save();
  ctx.translate(c.x, screenY);
  if (c.isPlayer && c.tilt) ctx.rotate(c.tilt);

  // Sombra
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(-c.w/2 + 3, -c.h/2 + 4, c.w, c.h);

  // Body
  ctx.fillStyle = c.color;
  ctx.fillRect(-c.w/2, -c.h/2, c.w, c.h);

  // Brillo
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(-c.w/2 + 2, -c.h/2 + 2, 4, c.h - 4);

  // Parabrisas
  ctx.fillStyle = '#1a2a3a';
  ctx.fillRect(-c.w/2 + 5, -c.h/2 + 8, c.w - 10, 16);
  ctx.fillRect(-c.w/2 + 5, c.h/2 - 24, c.w - 10, 16);

  // Center line
  ctx.fillStyle = c.isPlayer ? '#fff' : 'rgba(0,0,0,0.3)';
  ctx.fillRect(-1, -c.h/2 + 26, 2, c.h - 52);

  // Faros
  ctx.fillStyle = '#ffff88';
  ctx.fillRect(-c.w/2 + 4, -c.h/2 - 1, 6, 4);
  ctx.fillRect(c.w/2 - 10, -c.h/2 - 1, 6, 4);

  // Headlight halo for the player
  if (c.isPlayer) {
    ctx.fillStyle = 'rgba(255,255,150,0.15)';
    ctx.beginPath();
    ctx.moveTo(-c.w/2 + 7, -c.h/2);
    ctx.lineTo(-c.w/2 - 8, -c.h/2 - 40);
    ctx.lineTo(c.w/2 + 8, -c.h/2 - 40);
    ctx.lineTo(c.w/2 - 7, -c.h/2);
    ctx.closePath();
    ctx.fill();
  }

  // Luces traseras
  ctx.fillStyle = '#ff3333';
  ctx.fillRect(-c.w/2 + 4, c.h/2 - 3, 6, 3);
  ctx.fillRect(c.w/2 - 10, c.h/2 - 3, 6, 3);

  // Ruedas
  ctx.fillStyle = '#000';
  ctx.fillRect(-c.w/2 - 3, -c.h/2 + 6, 4, 14);
  ctx.fillRect(c.w/2 - 1, -c.h/2 + 6, 4, 14);
  ctx.fillRect(-c.w/2 - 3, c.h/2 - 20, 4, 14);
  ctx.fillRect(c.w/2 - 1, c.h/2 - 20, 4, 14);

  // Initial letter on rival roofs
  if (!c.isPlayer) {
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(c.name[0], 0, 0);
  }

  ctx.restore();
}

function drawMetaCelebration() {
  if (metaTextTime <= 0 || !metaText) return;
  ctx.save();
  const t = metaTextTime / 130;
  const fadeIn  = 1 - Math.max(0, (t - 0.85) * 6.67);  // fade in over first 0.15
  const fadeOut = Math.min(1, t * 4);                  // fade out over last 0.25
  const alpha = Math.min(fadeIn, fadeOut);
  const scale = 0.8 + (1 - t) * 0.4;
  ctx.globalAlpha = Math.max(0, alpha);
  ctx.font = 'bold ' + Math.round(50 * scale) + 'px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.lineWidth = 6;
  ctx.shadowColor = '#ffaa00';
  ctx.shadowBlur = 25;
  ctx.strokeStyle = '#000';
  ctx.fillStyle = '#ffaa00';
  ctx.strokeText(metaText, W / 2, H / 2);
  ctx.fillText(metaText, W / 2, H / 2);
  ctx.restore();
  metaTextTime--;
}

function drawCountdown() {
  if (countdownState === null) return;
  ctx.save();
  ctx.font = 'bold 90px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.lineWidth = 6;
  ctx.strokeStyle = '#000';
  ctx.fillStyle = countdownState === 'GO' ? '#33ff66' : '#ffaa00';
  const txt = countdownState === 'GO' ? 'GO!' : String(countdownState);
  ctx.shadowColor = ctx.fillStyle;
  ctx.shadowBlur = 25;
  ctx.strokeText(txt, W / 2, H / 2);
  ctx.fillText(txt, W / 2, H / 2);
  ctx.restore();
}

function drawCarLocal(color, stuck = false) {

function drawFree() {
  const p = player;
  const tNow = performance.now() / 1000;

  // Grass background
  ctx.fillStyle = '#3a5a3a';
  ctx.fillRect(0, 0, W, H);
  // Static grass speckles (relative to camera, gives parallax feel)
  ctx.fillStyle = '#2a4a2a';
  for (let i = 0; i < 40; i++) {
    const gx = ((i * 173) - p.worldX * 0.4) % (W + 60);
    const gy = ((i * 271) - p.worldY * 0.4) % (H + 60);
    const x = gx < 0 ? gx + W + 60 : gx;
    const y = gy < 0 ? gy + H + 60 : gy;
    ctx.fillRect(x - 30, y - 30, 4, 4);
  }

  // Camera follows player (player ends up at canvas center)
  ctx.save();
  ctx.translate(W/2 - p.worldX, H/2 - p.worldY);

  // Sand zone
  const s = FREE_WORLD.sand;
  ctx.fillStyle = '#e8d29a';
  ctx.fillRect(s.x, s.y, s.w, s.h);
  // Sand texture dots
  ctx.fillStyle = '#d0b878';
  for (let i = 0; i < 120; i++) {
    const sx = s.x + ((i * 137) % s.w);
    const sy = s.y + ((i * 211) % s.h);
    ctx.fillRect(sx, sy, 3, 3);
  }

  // Water zone
  const wz = FREE_WORLD.water;
  ctx.fillStyle = '#1a6bb5';
  ctx.fillRect(wz.x, wz.y, wz.w, wz.h);
  // Deeper blue further from shore
  const grad = ctx.createLinearGradient(wz.x, 0, wz.x + 400, 0);
  grad.addColorStop(0, 'rgba(26,107,181,0)');
  grad.addColorStop(1, 'rgba(10,60,120,0.7)');
  ctx.fillStyle = grad;
  ctx.fillRect(wz.x, wz.y, wz.w, wz.h);
  // Animated wave lines
  ctx.strokeStyle = 'rgba(255,255,255,0.22)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i < 24; i++) {
    const wy = wz.y + ((i * 90 + tNow * 25) % wz.h);
    ctx.moveTo(wz.x, wy);
    for (let xi = 0; xi < wz.w; xi += 30) {
      ctx.lineTo(wz.x + xi, wy + Math.sin(xi * 0.04 + tNow * 1.8 + i) * 4);
    }
  }
  ctx.stroke();
  // Foam at the beach edge
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  for (let y = wz.y; y < wz.y + wz.h; y += 14) {
    const xOff = Math.sin(y * 0.05 + tNow * 3) * 3;
    ctx.fillRect(wz.x - 2 + xOff, y, 6, 8);
  }

  // Connector road
  const r = FREE_WORLD.roadHoriz;
  ctx.fillStyle = '#3a3a3a';
  ctx.fillRect(r.x, r.y, r.w, r.h);
  ctx.fillStyle = '#fff';
  ctx.fillRect(r.x, r.y, r.w, 3);
  ctx.fillRect(r.x, r.y + r.h - 3, r.w, 3);
  for (let lx = r.x; lx < r.x + r.w; lx += 40) {
    ctx.fillRect(lx, r.y + r.h/2 - 2, 20, 4);
  }

  // Buildings (skip off-screen for perf)
  const viewMinX = p.worldX - W/2 - 20, viewMaxX = p.worldX + W/2 + 20;
  const viewMinY = p.worldY - H/2 - 20, viewMaxY = p.worldY + H/2 + 20;
  for (const b of FREE_WORLD.buildings) {
    if (b.x > viewMaxX || b.x + b.w < viewMinX || b.y > viewMaxY || b.y + b.h < viewMinY) continue;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(b.x + 6, b.y + 6, b.w, b.h);
    // Body
    ctx.fillStyle = b.color;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    // Roof darker stripe
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(b.x, b.y, b.w, 10);
    // Windows
    const winW = 14, winH = 18, stepX = 26, stepY = 30;
    for (let wy = b.y + 18; wy < b.y + b.h - 14; wy += stepY) {
      for (let wx = b.x + 12; wx < b.x + b.w - 12; wx += stepX) {
        const hash = (wx * 31 + wy * 17 + b.seed) >>> 0;
        const lit = (hash % 4) !== 0;
        ctx.fillStyle = lit ? '#ffeb88' : '#1a1a1a';
        ctx.fillRect(wx, wy, winW, winH);
      }
    }
    // Door
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(b.x + b.w/2 - 8, b.y + b.h - 22, 16, 22);
    ctx.fillStyle = '#ffd700';
    ctx.fillRect(b.x + b.w/2 + 4, b.y + b.h - 13, 2, 2);
  }

  // Palm trees on the beach
  for (const t of FREE_WORLD.palms) {
    if (t.x < viewMinX - 30 || t.x > viewMaxX + 30 || t.y < viewMinY - 30 || t.y > viewMaxY + 30) continue;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(t.x + 4, t.y + 16, 22, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    // Trunk
    ctx.fillStyle = '#6a4a2a';
    ctx.fillRect(t.x - 4, t.y - 8, 8, 26);
    // Leaves (gentle sway)
    const sway = Math.sin(tNow * 1.4 + t.x * 0.01) * 2;
    ctx.fillStyle = '#2a7a3a';
    ctx.beginPath();
    ctx.ellipse(t.x + sway, t.y - 12, 22, 14, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#1a5a2a';
    ctx.beginPath();
    ctx.ellipse(t.x - 10 + sway, t.y - 14, 13, 8, 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(t.x + 10 + sway, t.y - 14, 13, 8, -0.4, 0, Math.PI * 2);
    ctx.fill();
    // Coconuts
    ctx.fillStyle = '#3a2a1a';
    ctx.beginPath();
    ctx.arc(t.x - 5, t.y - 8, 3, 0, Math.PI * 2);
    ctx.arc(t.x + 5, t.y - 6, 3, 0, Math.PI * 2);
    ctx.fill();
  }

  // World-space smoke
  for (const sm of smoke) {
    if (!sm.world) continue;
    ctx.fillStyle = `rgba(180,180,180,${sm.life / 50})`;
    ctx.beginPath();
    ctx.arc(sm.worldX, sm.worldY, sm.size, 0, Math.PI * 2);
    ctx.fill();
  }

  // Draw parked car (only when player is on foot)
  if (p.onFoot) {
    ctx.save();
    ctx.translate(p.carWorldX, p.carWorldY);
    ctx.rotate(p.carAngle);
    drawCarLocal(p.color, false);
    ctx.restore();

    // Halo when player is near the parked car (visual hint)
    if (isNearCar()) {
      const pulse = 0.5 + Math.sin(tNow * 4) * 0.3;
      ctx.strokeStyle = `rgba(255,235,80,${pulse})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(p.carWorldX, p.carWorldY, 45, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  // Player car or person
  if (p.stuck) p.bobOffset = Math.sin(tNow * 4) * 2;
  ctx.save();
  ctx.translate(p.worldX, p.worldY + (p.bobOffset || 0));
  ctx.rotate(p.angle);
  if (p.onFoot) {
    drawPersonLocal(p.color);
  } else {
    drawCarLocal(p.color, p.stuck);
  }
  ctx.restore();

  // Splash particles (water entry)
  for (const pt of particles) {
    if (!pt.world) continue;
    ctx.fillStyle = pt.color || '#aaccff';
    ctx.globalAlpha = Math.min(1, pt.life / 30);
    ctx.beginPath();
    ctx.arc(pt.worldX, pt.worldY, pt.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.restore(); // restore camera transform

  // Compass / position indicator (screen space)
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(10, 10, 130, 56);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px monospace';
  ctx.textBaseline = 'top';
  ctx.textAlign = 'left';
  ctx.fillText(p.onFoot ? '🚶 ON FOOT' : '🚗 IN CAR', 18, 14);
  ctx.fillStyle = '#3aa6ff';
  ctx.fillText(`X: ${Math.round(p.worldX)}`, 18, 28);
  ctx.fillStyle = '#33dd55';
  ctx.fillText(`Y: ${Math.round(p.worldY)}`, 18, 40);
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.font = '9px monospace';
  ctx.fillText('[E] toggle car', 18, 53);

  // Zone hint
  let zone = 'GRASS';
  if (p.worldX < -200 && p.worldY > -700 && p.worldY < 700) zone = '🏙 CITY';
  else if (pointInRect(p.worldX, p.worldY, FREE_WORLD.sand)) zone = '🌴 BEACH';
  else if (pointInRect(p.worldX, p.worldY, FREE_WORLD.water)) zone = '🌊 SEA';
  else if (pointInRect(p.worldX, p.worldY, FREE_WORLD.roadHoriz)) zone = '🛣 ROAD';
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  const zoneText = zone;
  ctx.font = 'bold 11px monospace';
  const tw = ctx.measureText(zoneText).width;
  ctx.fillRect(W - tw - 22, 10, tw + 16, 22);
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'left';
  ctx.fillText(zoneText, W - tw - 14, 14);
}

function draw() {
  if (gameState === 'free' || gameState === 'stuck') { drawFree(); return; }
  ctx.save();
  if (shake > 0) {
    ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
  }

  drawRoad();

  // Humo (debajo de los autos)
  for (const s of smoke) {
    ctx.fillStyle = `rgba(180,180,180,${s.life / 60})`;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  }

  // Autos: orden por screenY ascendente para depth
  const allCars = [player, ...rivals];
  allCars.sort((a, b) => {
    const ay = a.isPlayer ? a.y : (PLAYER_BASE_Y - (a.worldY - player.worldY));
    const by = b.isPlayer ? b.y : (PLAYER_BASE_Y - (b.worldY - player.worldY));
    return ay - by;
  });
  for (const c of allCars) drawCar(c);

  // Particles
  for (const p of particles) {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = Math.min(1, p.life / 18);
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  drawMetaCelebration();
  drawCountdown();
  ctx.restore();
}

let lastTime = 0;
function loop(now) {
  const dt = lastTime ? Math.min(now - lastTime, 50) : 16;
  lastTime = now;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

function showOverlay(title, msg, btn, extra) {
  titleEl.textContent = title;
  msgEl.textContent = msg;
  startBtn.textContent = btn;
  if (extra) {
    extraEl.textContent = extra;
    extraEl.classList.remove('hidden');
    extraEl.classList.add('new-record');
  } else {
    extraEl.classList.add('hidden');
    extraEl.classList.remove('new-record');
  }
  overlay.classList.remove('hidden');
}

function endRun() {
  Sound.stopEngine();
  pauseBtn.classList.remove('visible');
  setTimeout(() => {
    const distance = Math.floor(player.worldY / 10);
    const isRecord = distance > bestScore;
    if (isRecord) {
      bestScore = distance;
      try { localStorage.setItem('furiousCarsBest', String(bestScore)); } catch (e) {}
      bestEl.textContent = bestScore;
      Sound.newRecord();
    } else {
      Sound.gameOver();
    }

    const title = isRecord ? 'NEW RECORD!' : 'WRECKED 💥';
    const metasStr = metasCrossed > 0 ? ` · 🏁×${metasCrossed}` : '';
    const msg = `Distance: ${distance} m · Level ${level}${metasStr}`;
    const extra = isRecord ? `★ ${distance} m ★` : `Best: ${bestScore} m`;
    showOverlay(title, msg, 'RETRY', extra);
  }, 900);
}

startBtn.addEventListener('click', startGame);

// Mute button
const muteBtn = document.getElementById('muteBtn');
function refreshMuteUI() {
  if (Sound.isMuted()) {
    muteBtn.textContent = '🔇';
    muteBtn.classList.add('muted');
    muteBtn.setAttribute('aria-label', 'Unmute');
    muteBtn.title = 'Unmute (M)';
  } else {
    muteBtn.textContent = '🔊';
    muteBtn.classList.remove('muted');
    muteBtn.setAttribute('aria-label', 'Mute');
    muteBtn.title = 'Mute (M)';
  }
}
refreshMuteUI();
muteBtn.addEventListener('click', () => {
  Sound.resume();
  Sound.toggleMute();
  refreshMuteUI();
});

// Pause / Resume / Exit
const pauseBtn = document.getElementById('pauseBtn');
const pauseOverlay = document.getElementById('pauseOverlay');
const pauseStats = document.getElementById('pauseStats');
const resumeBtn = document.getElementById('resumeBtn');
const quitBtn = document.getElementById('quitBtn');

function pauseGame() {
  if (gameState !== 'racing' && gameState !== 'countdown' && gameState !== 'free') return;
  player._wasMode = gameState; // remember to restore
  gameState = 'paused';
  Sound.stopEngine();
  document.getElementById('carBtn').classList.remove('visible');
  const distance = player ? Math.floor((player.worldY || 0) / 10) : 0;
  if (player && player._wasMode === 'free') {
    pauseStats.textContent = `FREE ROAM · (${Math.round(player.worldX)}, ${Math.round(player.worldY)})`;
  } else {
    pauseStats.textContent = `Distance: ${distance} m · Level ${level}`;
  }
  pauseOverlay.classList.remove('hidden');
}

function resumeGame() {
  if (gameState !== 'paused') return;
  gameState = (player && player._wasMode === 'free') ? 'free' : 'racing';
  pauseOverlay.classList.add('hidden');
  for (const k of ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown']) keys[k] = false;
  if (gameState === 'free' && player.onFoot) {
    // stay silent while walking
  } else {
    Sound.startEngine();
  }
  if (gameState === 'free') {
    document.getElementById('carBtn').classList.add('visible');
    updateCarBtn();
  }
}

function exitToMainPage() {
  Sound.stopEngine();
  Sound.playStation('off');
  pauseOverlay.classList.add('hidden');
  pauseBtn.classList.remove('visible');
  document.getElementById('hud').style.display = '';
  document.getElementById('scorebox').style.display = '';
  document.getElementById('carBtn').classList.remove('visible');

  const embedded = window.self !== window.top;

  if (!embedded) {
    // Standalone — navigate straight to the main page
    window.location.href = 'index.html';
    return;
  }

  // Embedded in PoxStar — scroll the parent page to its top (back to hero)
  try {
    window.parent.scrollTo({ top: 0, behavior: 'smooth' });
  } catch (e) {
    // Cross-origin fallback: replace top window with the main page
    try { window.top.location.href = 'index.html'; return; } catch (e2) {}
  }

  // Reset overlay to start screen so the game is fresh if they come back
  reset();
  titleEl.textContent = 'FURIOUS CARS 1';
  refreshModeButtons(); // restore proper mode message
  startBtn.textContent = 'START';
  extraEl.classList.add('hidden');
  extraEl.classList.remove('new-record');
  overlay.classList.remove('hidden');
}

pauseBtn.addEventListener('click', () => {
  Sound.resume();
  Sound.uiClick();
  pauseGame();
});
resumeBtn.addEventListener('click', () => {
  Sound.resume();
  Sound.uiClick();
  resumeGame();
});
quitBtn.addEventListener('click', () => {
  Sound.resume();
  Sound.uiClick();
  exitToMainPage();
});

document.getElementById('carBtn').addEventListener('click', () => {
  Sound.resume();
  toggleCar();
});

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
  if (e.key === 'm' || e.key === 'M') {
    Sound.toggleMute();
    refreshMuteUI();
  }
  if (e.key === 'e' || e.key === 'E') {
    if (gameState === 'free') {
      e.preventDefault();
      toggleCar();
    }
  }
  if (e.key === 'r' || e.key === 'R') {
    // Don't override browser shortcuts when modifiers are held
    if (!e.ctrlKey && !e.metaKey && !e.shiftKey) {
      e.preventDefault();
      cycleRadio();
    }
  }
  if (e.key === 'Escape' || e.key === 'p' || e.key === 'P') {
    e.preventDefault();
    if (gameState === 'racing' || gameState === 'countdown' || gameState === 'free') {
      Sound.uiClick();
      pauseGame();
    } else if (gameState === 'paused') {
      Sound.uiClick();
      resumeGame();
    }
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// Touch controls — the car follows the finger position (X and Y)
let touchActive = false;

function applyTouchPos(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  // Convertir a coordenadas internas del canvas (puede estar escalado por CSS)
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const x = (clientX - rect.left) * scaleX;
  const y = (clientY - rect.top) * scaleY;

  // 12px dead zone around the car to avoid jitter
  const dz = 12;

  // In free mode, the player is always rendered at canvas center
  const isFreeMode = gameState === 'free' || gameState === 'stuck';
  const refX = isFreeMode ? W / 2 : (player ? player.x : W / 2);
  const refY = isFreeMode ? H / 2 : (player ? player.y : H / 2);

  if (player || isFreeMode) {
    keys['ArrowLeft']  = x < refX - dz;
    keys['ArrowRight'] = x > refX + dz;
    keys['ArrowUp']    = y < refY - dz;
    keys['ArrowDown']  = y > refY + dz;
  } else {
    // Before first reset(): simple left/right fallback
    keys['ArrowLeft']  = x < W / 2;
    keys['ArrowRight'] = x >= W / 2;
  }
}

function clearTouchKeys() {
  keys['ArrowLeft']  = false;
  keys['ArrowRight'] = false;
  keys['ArrowUp']    = false;
  keys['ArrowDown']  = false;
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchActive = true;
  applyTouchPos(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!touchActive) return;
  applyTouchPos(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchActive = false;
  clearTouchKeys();
}, { passive: false });

canvas.addEventListener('touchcancel', e => {
  touchActive = false;
  clearTouchKeys();
}, { passive: false });

reset();
draw();
requestAnimationFrame(loop);
</script>
